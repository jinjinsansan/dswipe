<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="100%" stop-color="#122c4d"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1080" cy="80" r="340" fill="#0ea5e9" opacity="0.08"/>
  <circle cx="120" cy="580" r="280" fill="#06b6d4" opacity="0.07"/>

  <!-- ロゴマーク -->
  <g transform="translate(520, 130) scale(4)">
    <rect x="1" y="1" width="38" height="38" rx="11" fill="#0b1f3a" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <path d="M11 13h6c4 0 7 2.8 7 7s-3 7-7 7h-6z" fill="none" stroke="url(#brand)" stroke-width="2.6" stroke-linejoin="round"/>
    <path d="M25 20l6-5m-6 5l6 5" stroke="url(#brand)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- タイトル -->
  <text x="600" y="400" font-family="'Noto Sans JP', sans-serif" font-size="92" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-2">
    D-Swipe
  </text>

  <!-- サブタイトル -->
  <text x="600" y="470" font-family="'Noto Sans JP', sans-serif" font-size="38" fill="#9fb6d4" text-anchor="middle">
    スワイプLPとSwipeコラムのプラットフォーム
  </text>

  <!-- アクセントライン -->
  <rect x="500" y="510" width="200" height="6" rx="3" fill="url(#brand)"/>
</svg>
