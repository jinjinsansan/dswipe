<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D-Swipe — LINE友だち特典</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="c-system/tokens.css" />
<link rel="stylesheet" href="c-system/components.css" />
<style>
  body { margin: 0; font-family: var(--font); background: radial-gradient(700px 460px at 50% -10%, #11315a 0%, transparent 60%), linear-gradient(160deg,#07142a,#0b1f3a 60%,#07142a); min-height: 100vh; -webkit-font-smoothing: antialiased; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { width: 100%; max-width: 420px; background: var(--surface); border-radius: var(--r-3xl); box-shadow: 0 50px 120px -40px rgba(0,0,0,.7); overflow: hidden; }
  .top { background: linear-gradient(150deg,#06C755,#04a548); color: #fff; padding: 30px 28px 26px; text-align: center; position: relative; }
  .top .line { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; background: rgba(255,255,255,.18); border-radius: 999px; padding: 6px 14px; }
  .top .line svg { width: 16px; height: 16px; }
  .top h1 { font-size: 25px; font-weight: 800; letter-spacing: -.02em; margin: 16px 0 0; line-height: 1.4; }
  .top p { font-size: 13.5px; opacity: .92; margin: 8px 0 0; }
  .body { padding: 26px 28px 30px; }
  .reward { display: flex; align-items: center; gap: 14px; background: var(--surface-tint); border: 1px solid var(--tint-border); border-radius: var(--r-xl); padding: 16px; margin-bottom: 18px; }
  .reward .ic { width: 48px; height: 48px; border-radius: 13px; background: var(--grad-brand); color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: var(--sh-glow); }
  .reward .ic svg { width: 26px; height: 26px; }
  .reward .v { font-size: 22px; font-weight: 800; color: var(--ink); letter-spacing: -.02em; }
  .reward .l { font-size: 12px; color: var(--text-2); margin-top: 2px; }
  .gifts { display: flex; flex-direction: column; gap: 11px; margin-bottom: 22px; }
  .gift { display: flex; gap: 11px; align-items: flex-start; font-size: 13.5px; color: var(--text); }
  .gift .c { width: 24px; height: 24px; border-radius: 7px; background: var(--success-tint); color: var(--success-ink); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .gift .c svg { width: 14px; height: 14px; }
  .gift b { color: var(--ink); font-weight: 700; }
  .line-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: #06C755; color: #fff; font-family: var(--font); font-size: 16px; font-weight: 800; border: none; border-radius: var(--r-lg); padding: 16px; cursor: pointer; box-shadow: 0 12px 30px -10px rgba(6,199,85,.6); }
  .line-btn svg { width: 22px; height: 22px; }
  .steps { display: flex; justify-content: space-between; margin: 20px 4px 0; }
  .step { text-align: center; flex: 1; position: relative; }
  .step .n { width: 28px; height: 28px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--line); color: var(--muted); font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin: 0 auto 7px; }
  .step.done .n { background: var(--grad-brand); color: #fff; border: none; }
  .step .t { font-size: 11px; color: var(--muted); line-height: 1.4; }
  .step::after { content: ""; position: absolute; top: 14px; left: 60%; right: -40%; height: 2px; background: var(--line); z-index: -1; }
  .step:last-child::after { display: none; }
  .note { font-size: 11px; color: var(--muted); text-align: center; margin-top: 18px; line-height: 1.6; }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <g id="i-line" fill="currentColor"><path d="M12 3C6.5 3 2 6.6 2 11c0 3.9 3.5 7.2 8.3 7.9.3.07.7.2.8.5.1.25.07.6.04.86l-.13.8c-.04.24-.2.95.83.52 1.03-.43 5.5-3.24 7.5-5.55C20.7 14.9 22 13.1 22 11c0-4.4-4.5-8-10-8z"/></g>
  <g id="i-coin" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M12 8v8m-2.5-6h3.2a1.8 1.8 0 010 3.6H9.5"/></g>
  <g id="i-check" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></g>
</defs></svg>

<div class="card">
  <div class="top">
    <span class="line"><svg viewBox="0 0 24 24"><use href="#i-line"/></svg>LINE限定特典</span>
    <h1>友だち追加で<br>1,000ポイント プレゼント</h1>
    <p>D-Swipe 公式LINEを追加するだけ</p>
  </div>
  <div class="body">
    <div class="reward">
      <span class="ic"><svg viewBox="0 0 24 24"><use href="#i-coin"/></svg></span>
      <div><div class="v">1,000 P <span style="font-size:13px;font-weight:600;color:var(--muted)">即時付与</span></div><div class="l">有料記事・商品にすぐ使えます（¥1,000相当）</div></div>
    </div>
    <div class="gifts">
      <div class="gift"><span class="c"><svg viewBox="0 0 24 24"><use href="#i-check"/></svg></span><div><b>1,000ポイント</b>を友だち追加で即プレゼント</div></div>
      <div class="gift"><span class="c"><svg viewBox="0 0 24 24"><use href="#i-check"/></svg></span><div><b>限定LPテンプレート</b>を無料配布</div></div>
      <div class="gift"><span class="c"><svg viewBox="0 0 24 24"><use href="#i-check"/></svg></span>新着・セール情報をいち早くお届け</div>
    </div>
    <button class="line-btn"><svg viewBox="0 0 24 24"><use href="#i-line"/></svg>LINEで友だち追加する</button>
    <div class="steps">
      <div class="step done"><div class="n">1</div><div class="t">友だち追加</div></div>
      <div class="step"><div class="n">2</div><div class="t">合言葉を送信</div></div>
      <div class="step"><div class="n">3</div><div class="t">ポイント受取</div></div>
    </div>
    <div class="note">※ おひとり様1回限り。付与済みの方は対象外です。<br>追加後、トークに届く案内に従ってください。</div>
  </div>
</div>
</body>
</html>
