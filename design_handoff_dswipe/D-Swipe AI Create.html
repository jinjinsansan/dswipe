<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D-Swipe — AIでLPを作る</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="c-system/tokens.css" />
<link rel="stylesheet" href="c-system/components.css" />
<link rel="stylesheet" href="editor/editor.css" />
<style>
  body { margin: 0; font-family: var(--font); background: var(--canvas); color: var(--text); -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  .ai-nav { height: 60px; background: var(--surface); border-bottom: 1px solid var(--line); display: flex; align-items: center; padding: 0 22px; gap: 12px; }
  .ai-nav .logo { display: flex; align-items: center; gap: 9px; font-size: 17px; font-weight: 800; letter-spacing: -.02em; color: var(--ink); }
  .ai-nav .sp { flex: 1; }
  .ai-nav .step { font-size: 12.5px; font-weight: 700; color: var(--muted); }
  .ai-nav .step b { color: var(--brand); }

  /* form step */
  .form-stage { min-height: calc(100vh - 60px); display: flex; align-items: flex-start; justify-content: center; padding: 40px 22px 60px; }
  .form-card { width: 100%; max-width: 620px; }
  .fc-head { text-align: center; margin-bottom: 28px; }
  .fc-head .ico { width: 56px; height: 56px; border-radius: 17px; background: var(--grad-brand); color: #fff; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; box-shadow: var(--sh-glow); }
  .fc-head .ico svg { width: 28px; height: 28px; }
  .fc-head h1 { font-size: 28px; font-weight: 800; letter-spacing: -.025em; color: var(--ink); margin: 0; }
  .fc-head p { font-size: 14px; color: var(--text-2); margin: 10px 0 0; line-height: 1.7; }
  .fld { margin-bottom: 18px; }
  .fld label { display: block; font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 7px; }
  .fld label small { font-weight: 500; color: var(--muted); }
  .goal-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
  .goal { border: 1.5px solid var(--line); border-radius: var(--r-md); padding: 14px 10px; text-align: center; cursor: pointer; background: var(--surface); transition: all .15s; }
  .goal:hover { border-color: var(--tint-border); }
  .goal.on { border-color: var(--brand); background: var(--surface-tint); }
  .goal .gi { width: 32px; height: 32px; border-radius: 10px; background: var(--surface-tint); color: var(--brand); display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; }
  .goal.on .gi { background: var(--grad-brand); color: #fff; }
  .goal .gi svg { width: 18px; height: 18px; }
  .goal b { font-size: 12.5px; color: var(--ink); display: block; }
  .goal span { font-size: 10.5px; color: var(--muted); }
  .tone-row { display: flex; gap: 8px; }
  .tone { flex: 1; border: 1.5px solid var(--line); border-radius: var(--r-md); padding: 11px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-2); background: var(--surface); }
  .tone.on { border-color: var(--brand); background: var(--surface-tint); color: var(--brand); }

  /* gen step */
  .gen-stage { min-height: calc(100vh - 60px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 40px; text-align: center; }
  .gen-orb { width: 80px; height: 80px; border-radius: 24px; background: var(--grad-brand); display: flex; align-items: center; justify-content: center; box-shadow: var(--sh-glow-lg); animation: pulse 1.4s ease-in-out infinite; }
  .gen-orb svg { width: 40px; height: 40px; color: #fff; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  .gen-stage h2 { font-size: 22px; font-weight: 800; color: var(--ink); margin: 0; }
  .gen-steps { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 340px; }
  .gen-line { display: flex; align-items: center; gap: 11px; font-size: 13.5px; color: var(--muted); opacity: .4; transition: opacity .3s, color .3s; }
  .gen-line.on { opacity: 1; color: var(--ink); }
  .gen-line.done .gd { background: var(--success-tint); color: var(--success-ink); }
  .gen-line .gd { width: 22px; height: 22px; border-radius: 50%; background: var(--surface-2); color: var(--muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .gen-line .gd svg { width: 13px; height: 13px; }
  .gen-line.on:not(.done) .gd { background: var(--surface-tint); }

  /* result step */
  .res { display: grid; grid-template-columns: 1fr 360px; gap: 0; height: calc(100vh - 60px); }
  .res-left { overflow-y: auto; padding: 28px 32px; }
  .res-left .rh { display: flex; align-items: center; gap: 10px; }
  .res-left .rh h2 { font-size: 22px; font-weight: 800; letter-spacing: -.02em; color: var(--ink); margin: 0; }
  .res-left .rh .badge { background: var(--surface-tint); color: var(--brand); border: 1px solid var(--tint-border); }
  .res-left .rp { font-size: 13.5px; color: var(--text-2); margin: 8px 0 22px; line-height: 1.7; }
  .struct { display: flex; flex-direction: column; gap: 10px; }
  .sblock { display: flex; gap: 13px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); padding: 14px 15px; box-shadow: var(--sh-xs); }
  .sblock .sn { width: 26px; height: 26px; border-radius: 8px; background: var(--navy-900); color: #fff; font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sblock .si { flex: 1; min-width: 0; }
  .sblock .si .t { font-size: 13.5px; font-weight: 700; color: var(--ink); display: flex; align-items: center; gap: 8px; }
  .sblock .si .t .bt { font-size: 10.5px; font-weight: 700; color: var(--brand); background: var(--surface-tint); border-radius: 999px; padding: 2px 8px; }
  .sblock .si .x { font-size: 12px; color: var(--text-2); margin-top: 4px; line-height: 1.5; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
  .res-actions { display: flex; gap: 10px; margin-top: 24px; }
  .res-right { background: radial-gradient(500px 320px at 50% -10%, #11315a 0%, transparent 60%), linear-gradient(160deg,#07142a,#0b1f3a); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; position: relative; }
  .rr-phone { width: 270px; background: #0b1220; border-radius: 38px; padding: 9px; box-shadow: 0 40px 90px -30px rgba(0,0,0,.7); }
  .rr-screen { width: 252px; height: 524px; border-radius: 30px; overflow: hidden; position: relative; background: #fff; }
  .rr-track { position: absolute; inset: 0; transition: transform .5s cubic-bezier(.5,.05,.2,1); }
  .rr-slide { position: absolute; left: 0; right: 0; height: 524px; }
  .rr-slide .sc { transform: scale(.84); transform-origin: top left; width: 300px; height: 620px; }
  .rr-dots { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 5px; z-index: 3; }
  .rr-dots i { width: 5px; height: 5px; border-radius: 999px; background: rgba(255,255,255,.4); }
  .rr-dots i.on { background: #fff; height: 15px; }
  .rr-hint { font-size: 11.5px; color: rgba(255,255,255,.7); }

  @media (max-width: 880px) {
    .goal-grid { grid-template-columns: repeat(2,1fr); }
    .res { grid-template-columns: 1fr; height: auto; }
    .res-right { padding: 30px 0 40px; }
    .res-left { height: auto; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="editor/editor-blocks.jsx"></script>
<script type="text/babel">
const { SlideRenderer } = window;
const I = {
  spark: "M12 3l1.4 4L17 8l-3.6 1L12 13l-1.4-4L7 8l3.6-1z M18 14l.8 2.2L21 17l-2.2.8L18 20l-.8-2.2L15 17l2.2-.8z",
  list: "M4 6h2m-2 6h2m-2 6h2M9 6h11M9 12h11M9 18h11",
  yen: "M12 12V8m0 4l-4-5m4 5l4-5m-7 7h6m-6 3h6M12 12v6",
  users: "M9 8a3 3 0 100-.01 M3.5 19a5.5 5.5 0 0111 0 M16 5.5a3 3 0 010 5.8",
  cal: "M3 5h18v16H3z M3 9h18 M8 3v4 M16 3v4",
  check: "M4 12l5 5L20 6",
};
function Ic({ d, sw = 1.8 }) { return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"><path d={d} /></svg>; }

const GOALS = [
  { k: "list", n: "リスト獲得", d: "無料オファー", icon: I.list },
  { k: "sell", n: "商品販売", d: "有料商品", icon: I.yen },
  { k: "salon", n: "サロン募集", d: "月額継続", icon: I.users },
  { k: "book", n: "予約・相談", d: "来店/面談", icon: I.cal },
];
const TONES = [{ k: "trust", n: "信頼・誠実" }, { k: "energy", n: "勢い・情熱" }, { k: "friendly", n: "親しみ" }];

// structure per goal: array of block types
const STRUCT = {
  list: ["hero", "problem", "benefit", "testimonial", "cta"],
  sell: ["hero", "problem", "benefit", "testimonial", "offer", "cta"],
  salon: ["hero", "benefit", "testimonial", "offer", "cta"],
  book: ["hero", "problem", "benefit", "offer", "cta"],
};
const BLABEL = { hero: "ヒーロー", problem: "課題提起", benefit: "ベネフィット", testimonial: "お客様の声", offer: "オファー", cta: "CTA" };

function gen(f) {
  const p = f.product || "あなたの商品";
  const t = f.target || "お客様";
  const bgseq = { hero: "navy", problem: "deep", benefit: "light", testimonial: "teal", offer: "aurora", cta: "cyan" };
  const headline = { trust: `${p}で、\n変わる。`, energy: `${p}で、\nもう迷わない！`, friendly: `${p}、\nはじめませんか？` }[f.tone] || `${p}で、変わる。`;
  const cta = { list: "無料で受け取る", sell: "今すぐ申し込む", salon: "サロンに参加する", book: "無料相談を予約" }[f.goal];
  const make = {
    hero: { bg: bgseq.hero, eyebrow: f.desc ? f.desc.slice(0, 16) : "INTRODUCING", headline, sub: f.desc || `${t}のための${p}。今日から始められます。`, name: f.author || "", role: f.role || "" },
    problem: { bg: bgseq.problem, lead: "こんな悩み、\nありませんか？", items: [`${t}にありがちな失敗`, "時間も費用もかかる", "何から始めればいいか不明"] },
    benefit: { bg: bgseq.benefit, eyebrow: "WHAT YOU GET", heading: `${p}で\n手に入るもの`, items: [{ title: "すぐ実践できる", desc: "迷わず始められる手順" }, { title: "結果が出る型", desc: "再現性のある方法" }, { title: "ずっと使える", desc: "学びが資産になる" }] },
    testimonial: { bg: bgseq.testimonial, quote: `${p}のおかげで、本当に変われました。もっと早く出会いたかった。`, name: `${t}のお一人`, role: "利用者の声" },
    offer: { bg: bgseq.offer, scarcity: "先着50名 — 残り 12 名", heading: f.goal === "salon" ? "月額メンバーシップ" : "特別価格", priceWas: f.goal === "salon" ? "4,980" : "29,800", priceNow: f.goal === "salon" ? "2,980" : "9,800", guarantee: "14日間の返金保証つき" },
    cta: { bg: bgseq.cta, headline: "未来を、\n前に進めよう", sub: `${cta}で、今日から。`, button: cta },
  };
  return STRUCT[f.goal].map((type) => ({ type, content: make[type] }));
}

function App() {
  const [step, setStep] = React.useState("form");
  const [f, setF] = React.useState({ product: "", desc: "", target: "", goal: "list", tone: "trust", author: "", role: "" });
  const [slides, setSlides] = React.useState([]);
  const [genIdx, setGenIdx] = React.useState(0);
  const set = (k, v) => setF((x) => ({ ...x, [k]: v }));

  const GENLINES = ["商材を解析中…", "黄金構成を設計中…", "見出し・文章を生成中…", "配色とレイアウトを最適化中…"];
  const start = () => {
    setStep("gen"); setGenIdx(0);
    let i = 0;
    const tick = () => { i++; setGenIdx(i); if (i < GENLINES.length) setTimeout(tick, 520); else setTimeout(() => { setSlides(gen(f)); setStep("result"); }, 600); };
    setTimeout(tick, 450);
  };

  if (step === "form") return <Form f={f} set={set} start={start} />;
  if (step === "gen") return <Gen idx={genIdx} lines={GENLINES} />;
  return <Result f={f} slides={slides} onRedo={() => setStep("form")} />;
}

function Nav({ step }) {
  return (
    <div className="ai-nav">
      <a className="logo" href="D-Swipe Dashboard.html"><svg width="28" height="28" viewBox="0 0 40 40" fill="none"><defs><linearGradient id="al" x1="0" y1="0" x2="40" y2="40"><stop stopColor="#0ea5e9"/><stop offset="1" stopColor="#06b6d4"/></linearGradient></defs><rect x="1" y="1" width="38" height="38" rx="11" fill="#0b1f3a"/><path d="M11 13h6c4 0 7 2.8 7 7s-3 7-7 7h-6z" fill="none" stroke="url(#al)" strokeWidth="2.6" strokeLinejoin="round"/><path d="M25 20l6-5m-6 5l6 5" stroke="url(#al)" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"/></svg>D<span style={{color:"var(--brand)"}}>-</span>Swipe</a>
      <div className="sp"></div>
      <div className="step">AIでLPを作る · <b>{step === "form" ? "1. 入力" : step === "gen" ? "2. 生成" : "3. 確認"}</b> / 3</div>
    </div>
  );
}

function Form({ f, set, start }) {
  const ok = f.product.trim().length > 0;
  return (
    <React.Fragment>
      <Nav step="form" />
      <div className="form-stage"><div className="form-card">
        <div className="fc-head">
          <div className="ico"><Ic d={I.spark} /></div>
          <h1>AIに、たたき台を作ってもらう</h1>
          <p>商材とゴールを教えてください。最適な構成と文章で、スワイプLPの初稿を自動生成します。</p>
        </div>
        <div className="fld"><label>商材・サービス名 <small>必須</small></label><input className="input" placeholder="例：7日間スワイプ集客チャレンジ" value={f.product} onChange={(e) => set("product", e.target.value)} /></div>
        <div className="fld"><label>ひとことで言うと？ <small>任意</small></label><input className="input" placeholder="例：SNSだけで月100リストを集める講座" value={f.desc} onChange={(e) => set("desc", e.target.value)} /></div>
        <div className="fld"><label>ターゲット <small>任意</small></label><input className="input" placeholder="例：これから集客を始めたい個人事業主" value={f.target} onChange={(e) => set("target", e.target.value)} /></div>
        <div className="fld"><label>ゴール</label><div className="goal-grid">{GOALS.map((g) => (
          <div key={g.k} className={"goal" + (f.goal === g.k ? " on" : "")} onClick={() => set("goal", g.k)}><div className="gi"><Ic d={g.icon} /></div><b>{g.n}</b><span>{g.d}</span></div>
        ))}</div></div>
        <div className="fld"><label>トーン</label><div className="tone-row">{TONES.map((t) => (
          <div key={t.k} className={"tone" + (f.tone === t.k ? " on" : "")} onClick={() => set("tone", t.k)}>{t.n}</div>
        ))}</div></div>
        <button className="btn btn-primary btn-lg btn-block" disabled={!ok} onClick={start} style={{ marginTop: 8, opacity: ok ? 1 : .5 }}><Ic d={I.spark} sw={2} />AIで生成する</button>
      </div></div>
    </React.Fragment>
  );
}

function Gen({ idx, lines }) {
  return (
    <React.Fragment>
      <Nav step="gen" />
      <div className="gen-stage">
        <div className="gen-orb"><Ic d={I.spark} sw={1.6} /></div>
        <h2>AIがLPを生成しています…</h2>
        <div className="gen-steps">{lines.map((l, i) => (
          <div key={i} className={"gen-line" + (i < idx ? " on done" : i === idx ? " on" : "")}><span className="gd">{i < idx ? <Ic d={I.check} sw={2.4} /> : (i + 1)}</span>{l}</div>
        ))}</div>
      </div>
    </React.Fragment>
  );
}

function Result({ f, slides, onRedo }) {
  const [i, setI] = React.useState(0);
  const n = slides.length;
  let sy = null;
  const firstLine = (s) => {
    const c = s.content;
    return (c.headline || c.lead || c.heading || c.quote || c.eyebrow || "").replace(/\n/g, " ");
  };
  return (
    <React.Fragment>
      <Nav step="result" />
      <div className="res">
        <div className="res-left">
          <div className="rh"><h2>AIの初稿ができました</h2><span className="badge"><Ic d={I.spark} sw={2} style={{ width: 13, height: 13 }} />AI生成</span></div>
          <p className="rp">「{f.product || "あなたの商材"}」の{GOALS.find((g) => g.k === f.goal).n}に最適な<b>{n}スライド構成</b>を生成しました。各ブロックはエディタで自由に編集できます。</p>
          <div className="struct">
            {slides.map((s, idx) => (
              <div className="sblock" key={idx}>
                <span className="sn">{idx + 1}</span>
                <div className="si"><div className="t">{BLABEL[s.type]}<span className="bt">AI</span></div><div className="x">{firstLine(s)}</div></div>
              </div>
            ))}
          </div>
          <div className="res-actions">
            <a className="btn btn-primary btn-lg" href="D-Swipe LP Editor.html"><Ic d={I.check} sw={2} style={{ width: 16, height: 16 }} />エディタで開く</a>
            <button className="btn btn-secondary btn-lg" onClick={onRedo}>作り直す</button>
          </div>
        </div>
        <div className="res-right">
          <div className="rr-phone"><div className="rr-screen"
            onPointerDown={(e) => { sy = e.clientY; }}
            onPointerUp={(e) => { if (sy == null) return; const d = e.clientY - sy; if (Math.abs(d) > 36) setI((x) => Math.max(0, Math.min(n - 1, x + (d < 0 ? 1 : -1)))); sy = null; }}>
            <div className="rr-track" style={{ transform: `translateY(${-i * 524}px)` }}>
              {slides.map((s, idx) => <div className="rr-slide" key={idx} style={{ top: idx * 524 }}><SlideRenderer type={s.type} content={s.content} /></div>)}
            </div>
            <div className="rr-dots">{slides.map((_, idx) => <i key={idx} className={idx === i ? "on" : ""} />)}</div>
          </div></div>
          <div className="rr-hint">スワイプ／ドラッグでプレビュー · {i + 1} / {n}</div>
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
