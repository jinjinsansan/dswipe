<style>
  body { margin: 0; font-family: var(--font); background: var(--canvas); color: var(--text); -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  .wrap { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
  .pubnav { position: sticky; top: 0; z-index: 40; background: rgba(255,255,255,.85); backdrop-filter: blur(14px); border-bottom: 1px solid var(--line); }
  .pubnav-in { max-width: 1140px; margin: 0 auto; padding: 0 24px; height: 60px; display: flex; align-items: center; gap: 16px; }
  .pubnav .logo { display: flex; align-items: center; gap: 9px; font-size: 17px; font-weight: 800; letter-spacing: -.02em; color: var(--ink); }
  .pubnav .right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .pubnav .login { font-size: 13.5px; font-weight: 600; color: var(--text-2); padding: 8px 12px; }

  .head { background: radial-gradient(680px 320px at 80% -20%, #0e7490 0%, transparent 60%), linear-gradient(150deg,#0b1f3a,#0f2c52); color: #fff; padding: 42px 0 36px; }
  .head .k { font-size: 12px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--cyan-300); }
  .head h1 { font-size: 30px; font-weight: 800; letter-spacing: -.03em; margin: 10px 0 0; }
  .head p { font-size: 14px; color: #bcd3ee; margin: 9px 0 0; max-width: 62ch; line-height: 1.7; }

  .filters { position: sticky; top: 60px; z-index: 30; background: var(--canvas); padding: 16px 0 12px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid var(--line); }
  .fchip { font-family: var(--font); font-size: 13px; font-weight: 600; color: var(--text-2); background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 7px 14px; cursor: pointer; white-space: nowrap; }
  .fchip:hover { border-color: var(--tint-border); color: var(--ink); }
  .fchip.on { background: var(--surface-tint); border-color: var(--tint-border); color: var(--brand); }

  .catsec { padding: 30px 0 8px; }
  .catsec h2 { font-size: 18px; font-weight: 800; letter-spacing: -.01em; color: var(--ink); margin: 0 0 4px; }
  .catsec .cd { font-size: 13px; color: var(--muted); margin: 0 0 18px; }
  .bgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(168px,1fr)); gap: 18px; }
  .btile { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-xl); box-shadow: var(--sh-sm); overflow: hidden; transition: box-shadow .2s, transform .2s, border-color .2s; cursor: pointer; }
  .btile:hover { box-shadow: var(--sh-card); transform: translateY(-3px); border-color: var(--tint-border); }
  .btile .pp { height: 230px; background: #0b1220; padding: 7px; display: flex; justify-content: center; }
  .btile .pscr { width: 111px; height: 100%; border-radius: 13px; overflow: hidden; position: relative; }
  .btile .scale { position: absolute; top: 0; left: 0; width: 300px; height: 620px; transform: scale(.37); transform-origin: top left; }
  .btile .bb { padding: 12px 14px 14px; }
  .btile .bn { font-size: 13.5px; font-weight: 700; color: var(--ink); }
  .btile .bv { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .btile .badd { margin-top: 10px; width: 100%; font-family: var(--font); font-size: 12px; font-weight: 700; color: var(--brand); background: var(--surface-tint); border: 1px solid var(--tint-border); border-radius: 9px; padding: 7px; cursor: pointer; }

  .count-hint { font-size: 12.5px; color: var(--muted); padding: 14px 0 60px; }
  .count-hint b { color: var(--ink); }

  /* ---- extra block styles for new types (300x620 .sc canvas) ---- */
  .sc-compare { justify-content: center; }
  .sc-compare h2 { font-size: 19px; font-weight: 800; letter-spacing: -.02em; text-align: center; }
  .sc-compare .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
  .sc-compare .c { border-radius: 12px; padding: 12px; }
  .sc-compare .c.bad { background: rgba(255,255,255,.06); }
  .sc.light .sc-compare .c.bad { background: var(--surface-2); border: 1px solid var(--line); }
  .sc-compare .c.good { background: rgba(34,211,238,.14); border: 1px solid rgba(34,211,238,.3); }
  .sc.light .sc-compare .c.good { background: var(--surface-tint); border: 1px solid var(--tint-border); }
  .sc-compare .ch { font-size: 12px; font-weight: 800; margin-bottom: 8px; }
  .sc-compare .c.bad .ch { opacity: .7; }
  .sc-compare .c.good .ch { color: var(--cyan-400); }
  .sc.light .sc-compare .c.good .ch { color: var(--brand); }
  .sc-compare li { list-style: none; font-size: 11px; line-height: 1.5; margin-bottom: 7px; padding-left: 16px; position: relative; }
  .sc-compare li::before { position: absolute; left: 0; }
  .sc-compare .bad li::before { content: "×"; opacity: .6; }
  .sc-compare .good li::before { content: "✓"; color: var(--cyan-400); }
  .sc.light .sc-compare .good li::before { color: var(--brand); }

  .sc-steps { justify-content: center; }
  .sc-steps h2 { font-size: 19px; font-weight: 800; letter-spacing: -.02em; }
  .sc-steps .st { display: flex; gap: 12px; align-items: flex-start; margin-top: 16px; }
  .sc-steps .num { width: 28px; height: 28px; border-radius: 9px; background: var(--grad-brand); color: #fff; font-size: 13px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sc-steps .st b { font-size: 13px; font-weight: 700; }
  .sc-steps .st p { font-size: 11px; opacity: .8; margin: 2px 0 0; line-height: 1.5; }

  .sc-price { justify-content: center; align-items: center; text-align: center; }
  .sc-price .card { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 16px; padding: 20px 18px; width: 100%; }
  .sc.light .sc-price .card { background: #fff; border-color: var(--line); box-shadow: var(--sh-sm); }
  .sc-price .pn { font-size: 13px; font-weight: 700; opacity: .85; }
  .sc-price .pp { font-size: 36px; font-weight: 800; letter-spacing: -.02em; margin: 8px 0; }
  .sc-price .pp small { font-size: 14px; opacity: .6; }
  .sc-price ul { list-style: none; margin: 12px 0 16px; padding: 0; text-align: left; }
  .sc-price li { font-size: 11.5px; margin-bottom: 7px; padding-left: 18px; position: relative; }
  .sc-price li::before { content: "✓"; position: absolute; left: 0; color: var(--cyan-400); }
  .sc.light .sc-price li::before { color: var(--brand); }
  .sc-price .b { background: var(--grad-brand); color: #fff; font-weight: 800; font-size: 13px; padding: 11px; border-radius: 11px; }

  .sc-count { justify-content: center; align-items: center; text-align: center; }
  .sc-count .lab { font-size: 12px; font-weight: 700; letter-spacing: .1em; opacity: .85; }
  .sc-count .timer { display: flex; gap: 7px; margin: 16px 0; }
  .sc-count .u { background: rgba(255,255,255,.1); border-radius: 11px; padding: 11px 9px; min-width: 52px; }
  .sc.light .sc-count .u { background: var(--navy-900); color: #fff; }
  .sc-count .u .d { font-size: 26px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
  .sc-count .u .t { font-size: 9px; opacity: .7; margin-top: 4px; }
  .sc-count h2 { font-size: 18px; font-weight: 800; letter-spacing: -.02em; }

  .sc-gallery { justify-content: center; }
  .sc-gallery h2 { font-size: 18px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 14px; }
  .sc-gallery .g { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .sc-gallery .g div { aspect-ratio: 1; border-radius: 10px; }

  .sc-logos { justify-content: center; align-items: center; text-align: center; }
  .sc-logos .lab { font-size: 12px; opacity: .8; }
  .sc-logos h2 { font-size: 17px; font-weight: 800; letter-spacing: -.02em; margin: 8px 0 16px; }
  .sc-logos .g { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
  .sc-logos .g div { height: 38px; border-radius: 8px; background: rgba(255,255,255,.1); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; opacity: .75; }
  .sc.light .sc-logos .g div { background: var(--surface-2); border: 1px solid var(--line); }

  .sc-form { justify-content: center; }
  .sc-form h2 { font-size: 18px; font-weight: 800; letter-spacing: -.02em; text-align: center; }
  .sc-form .f { background: rgba(255,255,255,.1); border-radius: 10px; padding: 11px 12px; font-size: 11px; opacity: .8; margin-top: 10px; }
  .sc.light .sc-form .f { background: #fff; border: 1px solid var(--line); }
  .sc-form .b { background: var(--grad-brand); color: #fff; font-weight: 800; font-size: 13px; padding: 12px; border-radius: 11px; text-align: center; margin-top: 14px; }

  .sc-guarantee { justify-content: center; align-items: center; text-align: center; }
  .sc-guarantee .badge2 { width: 76px; height: 76px; border-radius: 50%; border: 2px dashed rgba(110,231,183,.6); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
  .sc-guarantee .badge2 svg { width: 38px; height: 38px; color: #6ee7b7; }
  .sc-guarantee h2 { font-size: 20px; font-weight: 800; letter-spacing: -.02em; }
  .sc-guarantee p { font-size: 12px; opacity: .85; margin: 10px 0 0; line-height: 1.7; }

  .sc-hero.left { align-items: flex-start; text-align: left; }
  .sc-hero.center2 { justify-content: center; align-items: center; text-align: center; }

  /* modal */
  .ov { position: fixed; inset: 0; z-index: 80; background: rgba(7,15,30,.7); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; padding: 24px; }
  .ov.show { display: flex; }
  .ov-card { background: var(--surface); border-radius: var(--r-2xl); box-shadow: 0 40px 100px -30px rgba(0,0,0,.6); display: flex; gap: 22px; padding: 24px; max-width: 620px; align-items: center; }
  .ov-phone { width: 220px; height: 452px; background: #0b1220; border-radius: 30px; padding: 8px; flex-shrink: 0; box-shadow: var(--sh-card); }
  .ov-scr { width: 204px; height: 100%; border-radius: 24px; overflow: hidden; position: relative; }
  .ov-scale { position: absolute; top: 0; left: 0; width: 300px; height: 620px; transform: scale(.68); transform-origin: top left; }
  .ov-info h3 { font-size: 19px; font-weight: 800; color: var(--ink); margin: 0; }
  .ov-info .cat { font-size: 12px; font-weight: 700; color: var(--brand); }
  .ov-info p { font-size: 13px; color: var(--text-2); line-height: 1.7; margin: 12px 0 18px; }
  .ov-info .btns { display: flex; gap: 10px; }
  @media (max-width: 560px) { .ov-card { flex-direction: column; max-width: 300px; } }
</style>
</head>

<script>
  // each block: cat key, name, variant label, desc, bg preset, inner HTML for .sc canvas
  const BG = { navy:"radial-gradient(220px 160px at 70% 12%,rgba(34,211,238,.3),transparent 60%),linear-gradient(165deg,#0b1f3a,#0e5d80)", cyan:"linear-gradient(150deg,#0284c7,#06b6d4)", teal:"linear-gradient(170deg,#0e7490,#0b1f3a)", deep:"linear-gradient(170deg,#111a2e,#0b1220)", aurora:"radial-gradient(200px 150px at 50% 0%,rgba(245,158,11,.2),transparent 60%),linear-gradient(170deg,#0b1f3a,#07142a)", light:"#f4f8fd" };
  const av = "linear-gradient(135deg,#22d3ee,#0ea5e9)";

  const B = [
    // 入口 hero
    { cat:"hero", name:"ヒーロー", v:"中央寄せ", bg:"navy", light:false, html:`<div class="sc-pad sc-hero center2"><span class="sc-eyebrow">7-DAY CHALLENGE</span><h1>7日間で、<br>集客が変わる</h1><p>SNSだけで月100リスト。</p></div>` },
    { cat:"hero", name:"ヒーロー", v:"左寄せ＋著者", bg:"teal", light:false, html:`<div class="sc-pad sc-hero left"><span class="sc-eyebrow">ONLINE COURSE</span><h1>売れる文章の<br>作り方</h1><p>プロの型を体系的に。</p><div class="by" style="margin-top:14px"><div class="av" style="width:30px;height:30px;border-radius:50%;background:${av};display:flex;align-items:center;justify-content:center;font-weight:800;color:#042032;font-size:12px">け</div><div><b style="font-size:12px">鈴木 けん</b></div></div></div>` },
    { cat:"hero", name:"ヒーロー", v:"画像背景", bg:"deep", light:false, html:`<div class="sc-pad sc-hero" style="justify-content:flex-end"><span class="sc-eyebrow">LIMITED</span><h1>いまだけ、<br>特別価格</h1><p>次の機会はありません。</p></div>` },
    // 課題
    { cat:"problem", name:"課題提起", v:"悩みリスト", bg:"deep", light:false, html:`<div class="sc-pad sc-problem"><div class="lead">こんな悩み、<br>ありませんか？</div><ul><li><span class="x">×</span>投稿しても反応が薄い</li><li><span class="x">×</span>作り方が分からない</li><li><span class="x">×</span>何を直すか不明</li></ul></div>` },
    { cat:"problem", name:"比較表", v:"Before / After", bg:"navy", light:false, html:`<div class="sc-pad sc-compare"><h2>こんなに変わる</h2><div class="cols"><div class="c bad"><div class="ch">これまで</div><ul class="bad"><li>反応ゼロ</li><li>毎回ゼロから</li><li>外注で高額</li></ul></div><div class="c good"><div class="ch">D-Swipe</div><ul class="good"><li>毎週リスト獲得</li><li>3分で量産</li><li>自分で完結</li></ul></div></div></div>` },
    // 価値
    { cat:"value", name:"ベネフィット", v:"3カード", bg:"cyan", light:false, html:`<div class="sc-pad sc-benefit"><span class="sc-eyebrow">WHAT YOU GET</span><h2>手に入るもの</h2><div class="bl"><div class="b"><span class="bi" style="width:30px;height:30px"></span><div><b>LP量産術</b><p>3分で1本</p></div></div><div class="b"><span class="bi" style="width:30px;height:30px"></span><div><b>改善の型</b><p>数字で判断</p></div></div></div></div>` },
    { cat:"value", name:"ステップ", v:"1-2-3", bg:"light", light:true, html:`<div class="sc-pad sc-steps"><h2>公開まで3ステップ</h2><div class="st"><div class="num">1</div><div><b>商材を入力</b><p>AIが構成を提案</p></div></div><div class="st"><div class="num">2</div><div><b>ドラッグで編集</b><p>文言と画像を差替え</p></div></div><div class="st"><div class="num">3</div><div><b>公開してシェア</b><p>専用URLを発行</p></div></div></div>` },
    { cat:"value", name:"ギャラリー", v:"2×2グリッド", bg:"deep", light:false, html:`<div class="sc-pad sc-gallery"><h2>制作事例</h2><div class="g"><div style="background:${BG.navy}"></div><div style="background:${BG.cyan}"></div><div style="background:${BG.teal}"></div><div style="background:${BG.aurora}"></div></div></div>` },
    // 社会的証明
    { cat:"proof", name:"お客様の声", v:"引用＋星", bg:"teal", light:false, html:`<div class="sc-pad sc-testi"><div class="qm">&ldquo;</div><div class="stars">★★★★★</div><blockquote>3日目で初リスト30件。やってよかった。</blockquote><div class="who"><div class="av" style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#ef4444);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px">A</div><div><b>佐藤 あや</b><span>副業コーチ</span></div></div></div>` },
    { cat:"proof", name:"実績ロゴ", v:"信頼の証", bg:"navy", light:false, html:`<div class="sc-pad sc-logos"><div class="lab">導入・掲載実績</div><h2>2,400社以上が利用</h2><div class="g"><div>LOGO</div><div>LOGO</div><div>LOGO</div><div>LOGO</div></div></div>` },
    { cat:"proof", name:"保証", v:"返金保証バッジ", bg:"teal", light:false, html:`<div class="sc-pad sc-guarantee"><div class="badge2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><use href="#i-shield"/></svg></div><h2>14日間返金保証</h2><p>安心してお試しください。満足いただけなければ全額返金します。</p></div>` },
    // オファー・行動
    { cat:"offer", name:"オファー", v:"価格＋限定", bg:"aurora", light:false, html:`<div class="sc-pad sc-offer"><span class="scar"><span class="d"></span>先着50名 残り12</span><h2>特別価格</h2><div class="price"><s>通常 29,800 P</s><div class="big">9,800<span class="p"> P</span></div></div></div>` },
    { cat:"offer", name:"価格表", v:"プランカード", bg:"light", light:true, html:`<div class="sc-pad sc-price"><div class="card"><div class="pn">Points 1,000</div><div class="pp">¥1,000<small>/1,000P</small></div><ul><li>AI構成アシスト</li><li>商品販売</li><li>詳細分析</li></ul><div class="b">購入する</div></div></div>` },
    { cat:"offer", name:"カウントダウン", v:"締切タイマー", bg:"deep", light:false, html:`<div class="sc-pad sc-count"><span class="lab">締切まで</span><div class="timer"><div class="u"><div class="d">02</div><div class="t">日</div></div><div class="u"><div class="d">14</div><div class="t">時間</div></div><div class="u"><div class="d">36</div><div class="t">分</div></div></div><h2>今だけの価格</h2></div>` },
    { cat:"offer", name:"CTA", v:"大ボタン", bg:"cyan", light:false, html:`<div class="sc-pad sc-cta"><h2>未来を、<br>前に進めよう</h2><p>ボタンひとつで完了。</p><div class="b">今すぐ申し込む</div></div>` },
    { cat:"offer", name:"申込フォーム", v:"入力＋送信", bg:"light", light:true, html:`<div class="sc-pad sc-form"><h2>無料で受け取る</h2><div class="f">お名前</div><div class="f">メールアドレス</div><div class="b">登録する</div></div>` },
    // 補足
    { cat:"faq", name:"よくある質問", v:"Q&A", bg:"navy", light:false, html:`<div class="sc-pad sc-faq"><h2>よくある質問</h2><div class="qa"><div class="item"><div class="q"><span class="mk">Q</span>初心者でも大丈夫？</div><div class="a">はい。テンプレとAIで迷わず作れます。</div></div><div class="item"><div class="q"><span class="mk">Q</span>返金はできる？</div><div class="a">14日間の返金保証があります。</div></div></div></div>` },
  ];

  const CATS = [
    { k:"all", n:"すべて" }, { k:"hero", n:"入口・ヒーロー" }, { k:"problem", n:"課題・共感" }, { k:"value", n:"価値・特徴" }, { k:"proof", n:"社会的証明" }, { k:"offer", n:"オファー・行動" }, { k:"faq", n:"補足・FAQ" },
  ];
  const CATDESC = { hero:"最初の1枚。つかみと第一印象を決める。", problem:"読み手の悩みに共感し、自分ごと化させる。", value:"得られる価値・手順・実例を伝える。", proof:"声・実績・保証で信頼を積む。", offer:"価格・限定・締切・申込で行動を促す。", faq:"不安を解消し、最後のひと押し。" };

  const filters = document.getElementById('filters');
  const sections = document.getElementById('sections');
  let active = 'all';

  function tile(b, i) {
    return `<div class="btile" data-i="${i}">
      <div class="pp"><div class="pscr"><div class="scale"><div class="sc ${b.light?'light':''}" style="background:${BG[b.bg]}">${b.html}</div></div></div></div>
      <div class="bb"><div class="bn">${b.name}</div><div class="bv">${b.v}</div><button class="badd">＋ 追加</button></div>
    </div>`;
  }
  function render() {
    filters.innerHTML = CATS.map(c => `<button class="fchip ${c.k===active?'on':''}" data-c="${c.k}">${c.n}</button>`).join('');
    const cats = active === 'all' ? CATS.slice(1) : CATS.filter(c => c.k === active);
    sections.innerHTML = cats.map(c => {
      const items = B.map((b, i) => ({ b, i })).filter(x => x.b.cat === c.k);
      if (!items.length) return '';
      return `<div class="catsec"><h2>${c.n}</h2><div class="cd">${CATDESC[c.k]||''}</div><div class="bgrid">${items.map(x => tile(x.b, x.i)).join('')}</div></div>`;
    }).join('');
    document.getElementById('counthint').innerHTML = `現在 <b>${B.length}種</b>のブロック × レイアウト変種。テーマカラーと組み合わせれば、見た目は無限に広がります。`;
    bind();
  }
  function bind() {
    filters.querySelectorAll('.fchip').forEach(b => b.addEventListener('click', () => { active = b.dataset.c; render(); window.scrollTo({top:0,behavior:'smooth'}); }));
    sections.querySelectorAll('.btile').forEach(t => t.addEventListener('click', () => openOv(B[+t.dataset.i])));
  }
  const ov = document.getElementById('ov');
  function openOv(b) {
    document.getElementById('ovScale').innerHTML = `<div class="sc ${b.light?'light':''}" style="background:${BG[b.bg]}">${b.html}</div>`;
    document.getElementById('ovCat').textContent = (CATS.find(c=>c.k===b.cat)||{}).n || '';
    document.getElementById('ovName').textContent = b.name + ' — ' + b.v;
    document.getElementById('ovDesc').textContent = CATDESC[b.cat] || '';
    ov.classList.add('show');
  }
  document.getElementById('ovClose').addEventListener('click', () => ov.classList.remove('show'));
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('show'); });
  render();
</script>
</body>
</html>
