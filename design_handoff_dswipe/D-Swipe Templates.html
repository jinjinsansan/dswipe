<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D-Swipe — 完成テンプレートから作る</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="c-system/tokens.css" />
<link rel="stylesheet" href="c-system/components.css" />
<link rel="stylesheet" href="editor/editor.css" />
<style>
  body { margin: 0; font-family: var(--font); background: var(--canvas); color: var(--text); -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 0 24px; }
  .pubnav { position: sticky; top: 0; z-index: 40; background: rgba(255,255,255,.85); backdrop-filter: blur(14px); border-bottom: 1px solid var(--line); }
  .pubnav-in { max-width: 1120px; margin: 0 auto; padding: 0 24px; height: 60px; display: flex; align-items: center; gap: 16px; }
  .pubnav .logo { display: flex; align-items: center; gap: 9px; font-size: 17px; font-weight: 800; letter-spacing: -.02em; color: var(--ink); }
  .pubnav .right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .pubnav .login { font-size: 13.5px; font-weight: 600; color: var(--text-2); padding: 8px 12px; }

  .head { background: radial-gradient(680px 320px at 80% -20%, #0e7490 0%, transparent 60%), linear-gradient(150deg,#0b1f3a,#0f2c52); color: #fff; padding: 44px 0 38px; }
  .head .k { font-size: 12px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--cyan-300); }
  .head h1 { font-size: 32px; font-weight: 800; letter-spacing: -.03em; margin: 10px 0 0; }
  .head p { font-size: 14.5px; color: #bcd3ee; margin: 10px 0 0; max-width: 60ch; line-height: 1.7; }

  .gal { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 32px 0 64px; }
  .tcard { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-2xl); box-shadow: var(--sh-sm); overflow: hidden; display: flex; flex-direction: column; transition: box-shadow .2s, transform .2s, border-color .2s; }
  .tcard:hover { box-shadow: var(--sh-card); transform: translateY(-3px); border-color: var(--tint-border); }
  .tprev { padding: 20px 20px 0; display: flex; justify-content: center; background: var(--canvas); position: relative; }
  .tprev .thumb-ph { width: 150px; height: 304px; border-radius: 22px; background: #0b1220; padding: 6px; box-shadow: 0 20px 44px -22px rgba(11,31,58,.6); overflow: hidden; }
  .tprev .thumb-scr { width: 100%; height: 100%; border-radius: 17px; overflow: hidden; position: relative; }
  .tprev .scale { width: 300px; height: 620px; transform: scale(.46); transform-origin: top left; position: absolute; top: 0; left: 0; }
  .tprev .cnt { position: absolute; top: 28px; right: 28px; font-size: 11px; font-weight: 700; color: #fff; background: rgba(11,31,58,.6); backdrop-filter: blur(4px); padding: 3px 10px; border-radius: 999px; }
  .tbody { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .tbody .cat { font-size: 11px; font-weight: 700; color: var(--brand); letter-spacing: .04em; }
  .tbody h3 { font-size: 16px; font-weight: 700; color: var(--ink); margin: 4px 0 0; }
  .tbody p { font-size: 12.5px; color: var(--text-2); line-height: 1.6; margin: 6px 0 0; flex: 1; }
  .tbody .acts { display: flex; gap: 8px; margin-top: 14px; }
  .tbody .acts .btn { flex: 1; }

  /* deck overlay */
  .ov { position: fixed; inset: 0; z-index: 80; background: radial-gradient(700px 460px at 50% -10%, #11315a 0%, transparent 60%), linear-gradient(160deg,#07142a,#0b1f3a 60%,#07142a); display: none; flex-direction: column; }
  .ov.show { display: flex; }
  .ov-top { height: 58px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 18px; color: #fff; }
  .ov-top .t { font-size: 14px; font-weight: 700; }
  .ov-top .t small { display: block; font-size: 11px; color: var(--on-navy-muted); font-weight: 500; }
  .ov-x { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.08); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .ov-x svg { width: 18px; height: 18px; }
  .ov-stage { flex: 1; display: flex; align-items: center; justify-content: center; gap: 18px; min-height: 0; position: relative; }
  .navb { width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.08); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: absolute; top: 50%; transform: translateY(-50%); z-index: 3; }
  .navb svg { width: 20px; height: 20px; }
  .navb:disabled { opacity: .3; }
  .navb.prev { left: 16px; } .navb.next { right: 16px; }
  .dphone { width: 318px; flex-shrink: 0; background: #0b1220; border-radius: 40px; padding: 9px; box-shadow: 0 40px 90px -30px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.07); }
  .dscreen { width: 300px; height: 620px; border-radius: 32px; overflow: hidden; position: relative; background: #fff; }
  .dtrack { position: absolute; inset: 0; transition: transform .5s cubic-bezier(.5,.05,.2,1); }
  .dslide { position: absolute; left: 0; right: 0; height: 620px; }
  .ddots { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); z-index: 4; display: flex; flex-direction: column; gap: 5px; }
  .ddots i { width: 5px; height: 5px; border-radius: 999px; background: rgba(255,255,255,.4); }
  .ddots i.on { background: #fff; height: 16px; }
  .dcta { position: absolute; left: 0; right: 0; bottom: 0; z-index: 4; padding: 12px 14px; background: linear-gradient(to top,rgba(7,15,30,.95),transparent); display: flex; align-items: center; gap: 10px; }
  .dcta .pt { font-size: 11px; color: #cfe0f5; flex: 1; min-width: 0; }
  .dcta .pt b { display: block; font-size: 15px; font-weight: 800; color: #fff; }
  .dcta .b { font-size: 12px; font-weight: 800; color: #0b1f3a; background: #fff; padding: 9px 14px; border-radius: 11px; white-space: nowrap; }
  .ov-foot { flex-shrink: 0; padding: 14px; display: flex; justify-content: center; }

  @media (max-width: 900px) { .gal { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 520px) { .gal { grid-template-columns: 1fr; } .head h1 { font-size: 26px; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="editor/editor-blocks.jsx"></script>

<script type="text/babel">
const { SlideRenderer } = window;

const TEMPLATES = [
  {
    id: "challenge", cat: "チャレンジ型", name: "7日間チャレンジ", desc: "無料オファーでリスト獲得。SNS集客の王道。", price: "無料 / リスト獲得",
    slides: [
      { type: "hero", content: { bg: "navy", eyebrow: "7-DAY CHALLENGE", headline: "7日間で、\n集客が変わる。", sub: "SNSだけで月100リスト。再現性のある導線を、スワイプ1本で。", name: "山田 太郎", role: "マーケティング講師" } },
      { type: "problem", content: { bg: "deep", lead: "こんな悩み、\nありませんか？", items: ["毎日投稿しても反応が薄い", "LPの作り方が分からない", "何を直せば伸びるか不明"] } },
      { type: "benefit", content: { bg: "cyan", eyebrow: "WHAT YOU GET", heading: "7日間で\n手に入るもの", items: [{ title: "最短3分のLP量産術", desc: "テンプレに沿って入力するだけ" }, { title: "数字で改善する型", desc: "離脱とCTAで勝ち筋を発見" }, { title: "7日間の伴走サポート", desc: "つまずいてもすぐ質問" }] } },
      { type: "testimonial", content: { bg: "teal", quote: "3日目で初めてのリストが30件。やってよかった。", name: "佐藤 あや", role: "受講3週間 / 副業コーチ" } },
      { type: "cta", content: { bg: "cyan", headline: "無料で、\n受け取ろう。", sub: "メール登録だけ。今すぐ7日間を始める。", button: "無料で受け取る" } },
    ],
  },
  {
    id: "course", cat: "講座・コース型", name: "オンライン講座", desc: "動画・有料講座の販売に。信頼を積み上げる構成。", price: "9,800 P",
    slides: [
      { type: "hero", content: { bg: "teal", eyebrow: "ONLINE COURSE", headline: "売れる文章の\n作り方講座", sub: "コピー1本で売上を変える。プロの型を体系的に。", name: "鈴木 けん", role: "セールスライター" } },
      { type: "benefit", content: { bg: "light", eyebrow: "CURRICULUM", heading: "学べること", items: [{ title: "売れる見出しの公式", desc: "3秒で続きを読ませる" }, { title: "感情を動かす本文設計", desc: "ストーリーの組み立て方" }, { title: "CTAの最適配置", desc: "クリックされる導線" }] } },
      { type: "testimonial", content: { bg: "navy", quote: "学んだ翌週、初めてのセールスで12万円。型は裏切らない。", name: "田中 みう", role: "受講2ヶ月 / 個人事業主" } },
      { type: "faq", content: { bg: "light", heading: "よくある質問", items: [{ q: "初心者でも大丈夫？", a: "はい。基礎から順に学べます。" }, { q: "返金はできる？", a: "14日間の返金保証つきです。" }] } },
      { type: "offer", content: { bg: "aurora", scarcity: "今月の募集 残り 8 名", heading: "受講料", priceWas: "29,800", priceNow: "9,800", guarantee: "14日間の返金保証つき" } },
      { type: "cta", content: { bg: "cyan", headline: "今日から、\n書ける人へ。", sub: "ボタンひとつで受講スタート。", button: "講座を申し込む" } },
    ],
  },
  {
    id: "sales", cat: "セールス型", name: "限定オファー", desc: "期間限定・高単価商品の販売に。勢いで決める。", price: "高単価向け",
    slides: [
      { type: "hero", content: { bg: "aurora", eyebrow: "LIMITED OFFER", headline: "いまだけ、\n特別価格。", sub: "次にこの価格で出る保証はありません。", name: "高橋 じん", role: "事業プロデューサー" } },
      { type: "problem", content: { bg: "deep", lead: "値段で、\n諦めていませんか？", items: ["やりたいのに先延ばし", "他社は高すぎて手が出ない", "今が始めどきだと分かってる"] } },
      { type: "offer", content: { bg: "aurora", scarcity: "先着50名 — 残り 12 名", heading: "特別価格", priceWas: "98,000", priceNow: "39,800", guarantee: "30日間の全額返金保証" } },
      { type: "testimonial", content: { bg: "teal", quote: "迷って損した。もっと早く決めればよかった。", name: "中村 ゆい", role: "購入者 / 経営者" } },
      { type: "cta", content: { bg: "cyan", headline: "締切まで、\nあと わずか。", sub: "この価格は今だけ。後悔しない選択を。", button: "今すぐ申し込む" } },
    ],
  },
  {
    id: "salon", cat: "サロン・継続型", name: "メンバーシップ", desc: "月額サロンの募集に。継続的な関係をつくる。", price: "¥2,980 / 月",
    slides: [
      { type: "hero", content: { bg: "navy", eyebrow: "MEMBERSHIP", headline: "ひとりで、\n悩まない。", sub: "学び続ける仲間と、結果が出るまで伴走するサロン。", name: "山田 太郎", role: "主宰 / 集客ラボ" } },
      { type: "benefit", content: { bg: "light", eyebrow: "MEMBER BENEFITS", heading: "会員特典", items: [{ title: "限定LP・テンプレ配布", desc: "毎月の新作テンプレ" }, { title: "月2回の勉強会", desc: "アーカイブ見放題" }, { title: "質問し放題フィード", desc: "つまずきを即解決" }] } },
      { type: "testimonial", content: { bg: "teal", quote: "毎月の勉強会が刺激に。半年で売上が3倍になりました。", name: "佐藤 あや", role: "会員歴6ヶ月" } },
      { type: "offer", content: { bg: "aurora", scarcity: "248名が参加中", heading: "月額メンバーシップ", priceWas: "4,980", priceNow: "2,980", guarantee: "いつでも退会OK・初月半額" } },
      { type: "cta", content: { bg: "cyan", headline: "仲間と、\n前に進もう。", sub: "今月の参加枠は残りわずか。", button: "サロンに参加する" } },
    ],
  },
];

const CTA_LABEL = { challenge: "無料で受け取る", course: "講座を申し込む", sales: "今すぐ申し込む", salon: "サロンに参加する" };
const CTA_PRICE = { challenge: "無料・メール登録", course: "9,800 P", sales: "39,800 P", salon: "¥2,980 / 月" };

function Thumb({ tpl }) {
  return (
    <div className="thumb-ph"><div className="thumb-scr"><div className="scale">
      <SlideRenderer type={tpl.slides[0].type} content={tpl.slides[0].content} />
    </div></div></div>
  );
}

function Deck({ tpl, onClose }) {
  const [i, setI] = React.useState(0);
  const n = tpl.slides.length;
  const go = (d) => setI((x) => Math.max(0, Math.min(n - 1, x + d)));
  const trackRef = React.useRef(null);

  React.useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); if (e.key === "ArrowDown") go(1); if (e.key === "ArrowUp") go(-1); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  // scale phone to fit viewport height
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const fit = () => setScale(Math.min(1, (window.innerHeight - 190) / 638));
    fit(); window.addEventListener("resize", fit); return () => window.removeEventListener("resize", fit);
  }, []);

  let startY = null;
  const onDown = (e) => { startY = e.clientY; };
  const onUp = (e) => { if (startY == null) return; const dy = e.clientY - startY; if (Math.abs(dy) > 40) go(dy < 0 ? 1 : -1); startY = null; };

  return (
    <div className="ov show" onClick={(e) => { if (e.target.classList.contains("ov") || e.target.classList.contains("ov-stage")) onClose(); }}>
      <div className="ov-top">
        <div className="t">{tpl.name}<small>{tpl.cat} · 全{n}スライド</small></div>
        <button className="ov-x" onClick={onClose} aria-label="閉じる"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
      </div>
      <div className="ov-stage">
        <button className="navb prev" onClick={() => go(-1)} disabled={i === 0} aria-label="前へ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>
        <div className="dphone" style={{ transform: `scale(${scale})` }} onPointerDown={onDown} onPointerUp={onUp}>
          <div className="dscreen">
            <div className="dtrack" ref={trackRef} style={{ transform: `translateY(${-i * 620}px)` }}>
              {tpl.slides.map((s, idx) => (
                <div className="dslide" key={idx} style={{ top: idx * 620 }}>
                  <SlideRenderer type={s.type} content={s.content} />
                </div>
              ))}
            </div>
            <div className="ddots">{tpl.slides.map((_, idx) => <i key={idx} className={idx === i ? "on" : ""} />)}</div>
            <div className="dcta"><div className="pt">{tpl.name}<b>{CTA_PRICE[tpl.id]}</b></div><span className="b">{CTA_LABEL[tpl.id]}</span></div>
          </div>
        </div>
        <button className="navb next" onClick={() => go(1)} disabled={i === n - 1} aria-label="次へ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>
      </div>
      <div className="ov-foot"><a className="btn btn-primary btn-lg" href="D-Swipe LP Editor.html">このテンプレで作る</a></div>
    </div>
  );
}

function App() {
  const [open, setOpen] = React.useState(null);
  return (
    <React.Fragment>
      <nav className="pubnav"><div className="pubnav-in">
        <a className="logo" href="D-Swipe Top (Swipe).html"><svg width="28" height="28" viewBox="0 0 40 40" fill="none"><defs><linearGradient id="pl" x1="0" y1="0" x2="40" y2="40"><stop stopColor="#0ea5e9"/><stop offset="1" stopColor="#06b6d4"/></linearGradient></defs><rect x="1" y="1" width="38" height="38" rx="11" fill="#0b1f3a"/><path d="M11 13h6c4 0 7 2.8 7 7s-3 7-7 7h-6z" fill="none" stroke="url(#pl)" strokeWidth="2.6" strokeLinejoin="round"/><path d="M25 20l6-5m-6 5l6 5" stroke="url(#pl)" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"/></svg>D<span style={{color:"var(--brand)"}}>-</span>Swipe</a>
        <div className="right"><a className="login" href="D-Swipe Dashboard.html">ダッシュボード</a><a className="btn btn-primary btn-sm" href="D-Swipe LP Editor.html">空白から作る</a></div>
      </div></nav>

      <header className="head"><div className="wrap">
        <div className="k">Templates</div>
        <h1>完成テンプレートから作る</h1>
        <p>構成・トーン・余白まで整ったプロ品質のスワイプLP。文言と画像を差し替えるだけで公開できます。どの端末でも文字が切れない安全レイアウト設計です。</p>
      </div></header>

      <div className="wrap">
        <div className="gal">
          {TEMPLATES.map((t) => (
            <div className="tcard" key={t.id}>
              <div className="tprev"><Thumb tpl={t} /><span className="cnt">全{t.slides.length}枚</span></div>
              <div className="tbody">
                <span className="cat">{t.cat}</span>
                <h3>{t.name}</h3>
                <p>{t.desc}</p>
                <div className="acts">
                  <button className="btn btn-secondary btn-sm" onClick={() => setOpen(t)}>プレビュー</button>
                  <a className="btn btn-primary btn-sm" href="D-Swipe LP Editor.html">使う</a>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {open && <Deck tpl={open} onClose={() => setOpen(null)} />}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
