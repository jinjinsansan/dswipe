<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D-Swipe — 素材ライブラリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="c-system/tokens.css" />
<link rel="stylesheet" href="c-system/components.css" />
<style>
  body { margin: 0; font-family: var(--font); background: radial-gradient(700px 460px at 50% -10%, #11315a 0%, transparent 60%), linear-gradient(160deg,#07142a,#0b1f3a); min-height: 100vh; -webkit-font-smoothing: antialiased; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal { width: 100%; max-width: 940px; height: min(88vh, 660px); background: var(--surface); border-radius: var(--r-2xl); box-shadow: 0 50px 120px -40px rgba(0,0,0,.7); display: flex; flex-direction: column; overflow: hidden; }
  .mhead { padding: 18px 22px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 14px; }
  .mhead h2 { font-size: 17px; font-weight: 800; color: var(--ink); margin: 0; }
  .mhead .sb { margin-left: auto; position: relative; width: 280px; max-width: 40vw; }
  .mhead .sb svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 17px; height: 17px; color: var(--muted); }
  .mhead .sb input { width: 100%; font-family: var(--font); font-size: 13.5px; border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px 9px 36px; color: var(--ink); }
  .mhead .sb input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(2,132,199,.14); }
  .mhead .x { width: 32px; height: 32px; border-radius: 8px; border: none; background: var(--surface-2); color: var(--muted); cursor: pointer; }

  .mbody { flex: 1; display: grid; grid-template-columns: 184px 1fr 280px; min-height: 0; }
  .cats { border-right: 1px solid var(--line); padding: 14px 12px; display: flex; flex-direction: column; gap: 3px; overflow-y: auto; }
  .cat { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border-radius: var(--r-md); font-size: 13px; font-weight: 600; color: var(--text-2); cursor: pointer; border: none; background: none; font-family: var(--font); text-align: left; }
  .cat svg { width: 17px; height: 17px; flex-shrink: 0; }
  .cat .n { margin-left: auto; font-size: 11px; color: var(--faint); font-variant-numeric: tabular-nums; }
  .cat:hover { background: var(--surface-2); color: var(--ink); }
  .cat.on { background: var(--surface-tint); color: var(--brand); }

  .grid-wrap { overflow-y: auto; padding: 16px; }
  .ghead { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .agrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(112px,1fr)); gap: 10px; }
  .asset { aspect-ratio: 1; border-radius: var(--r-md); cursor: pointer; position: relative; border: 2px solid transparent; overflow: hidden; box-shadow: var(--sh-xs); }
  .asset.on { border-color: var(--brand); box-shadow: 0 0 0 2px rgba(2,132,199,.2); }
  .asset .ck { position: absolute; top: 6px; right: 6px; width: 20px; height: 20px; border-radius: 50%; background: var(--brand); display: none; align-items: center; justify-content: center; }
  .asset.on .ck { display: flex; }
  .asset .ck svg { width: 12px; height: 12px; color: #fff; }
  .asset.ico { display: flex; align-items: center; justify-content: center; background: var(--surface-2); border: 1px solid var(--line); color: var(--brand); }
  .asset.ico svg { width: 36px; height: 36px; }

  /* preview / fit panel */
  .prev { border-left: 1px solid var(--line); padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .prev .ph { font-size: 12px; font-weight: 700; color: var(--ink); }
  .fitbox { background: var(--canvas); border: 1px solid var(--line); border-radius: var(--r-md); padding: 16px; display: flex; justify-content: center; }
  .fit-phone { width: 130px; height: 231px; border-radius: 16px; overflow: hidden; position: relative; box-shadow: var(--sh-sm); }
  .fit-phone .img { position: absolute; inset: 0; background-size: cover; background-position: center; transition: background-position .2s, transform .2s; }
  .fit-phone .safe { position: absolute; inset: 0; outline: 2px dashed rgba(255,255,255,.6); outline-offset: -10px; border-radius: 16px; pointer-events: none; }
  .fit-phone .safe::after { content: "セーフエリア"; position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%); font-size: 8px; font-weight: 700; color: #fff; background: rgba(0,0,0,.4); padding: 2px 7px; border-radius: 999px; white-space: nowrap; }
  .ctrl { display: flex; flex-direction: column; gap: 7px; }
  .ctrl label { font-size: 11.5px; font-weight: 600; color: var(--muted); display: flex; justify-content: space-between; }
  .ctrl input[type=range] { width: 100%; accent-color: var(--brand); }
  .ratio { display: flex; gap: 6px; }
  .ratio button { flex: 1; font-family: var(--font); font-size: 11.5px; font-weight: 700; border: 1px solid var(--line); background: var(--surface); color: var(--text-2); border-radius: 8px; padding: 7px; cursor: pointer; }
  .ratio button.on { border-color: var(--brand); background: var(--surface-tint); color: var(--brand); }
  .prev .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; text-align: center; color: var(--muted); }
  .prev .empty svg { width: 38px; height: 38px; opacity: .4; }
  .prev .empty p { font-size: 12.5px; line-height: 1.6; margin: 0; }
  .prev .apply { margin-top: auto; }

  @media (max-width: 760px) { .mbody { grid-template-columns: 1fr; } .cats { flex-direction: row; overflow-x: auto; border-right: none; border-bottom: 1px solid var(--line); } .cat .n { display: none; } .prev { display: none; } }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <g id="i-up" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M6 10l6-6 6 6M4 20h16"/></g>
  <g id="i-img" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 16l5-5 4 4 3-3 6 6"/></g>
  <g id="i-grad" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/></g>
  <g id="i-shapes" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="8" r="4"/><rect x="13" y="13" width="7" height="7" rx="1.5"/><path d="M4 20l3-5 3 5z"/></g>
  <g id="i-user" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 20a7 7 0 0114 0"/></g>
  <g id="i-search" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></g>
  <g id="i-check" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></g>
  <g id="i-bolt" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L4 14h7l-1 8 9-12h-7z"/></g>
  <g id="i-x" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></g>
  <g id="i-pick" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 6h18M3 18h12"/></g>
</defs></svg>

<div class="modal">
  <div class="mhead">
    <h2>素材を選ぶ</h2>
    <div class="sb"><svg viewBox="0 0 24 24"><use href="#i-search"/></svg><input placeholder="キーワードで検索（例：ビジネス・空・グラデ）" /></div>
    <button class="x"><svg width="16" height="16" viewBox="0 0 24 24"><use href="#i-x"/></svg></button>
  </div>
  <div class="mbody">
    <div class="cats" id="cats">
      <button class="cat" data-c="upload"><svg viewBox="0 0 24 24"><use href="#i-up"/></svg>アップロード<span class="n">3</span></button>
      <button class="cat on" data-c="photo"><svg viewBox="0 0 24 24"><use href="#i-img"/></svg>ストック写真<span class="n">240</span></button>
      <button class="cat" data-c="grad"><svg viewBox="0 0 24 24"><use href="#i-grad"/></svg>グラデ背景<span class="n">180</span></button>
      <button class="cat" data-c="icon"><svg viewBox="0 0 24 24"><use href="#i-shapes"/></svg>アイコン<span class="n">320</span></button>
      <button class="cat" data-c="people"><svg viewBox="0 0 24 24"><use href="#i-user"/></svg>人物・ライフ<span class="n">90</span></button>
    </div>

    <div class="grid-wrap">
      <div class="ghead" id="ghead">ストック写真 · ビジネス/抽象</div>
      <div class="agrid" id="agrid"></div>
    </div>

    <div class="prev" id="prev">
      <div class="empty" id="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><use href="#i-img"/></svg><p>素材を選ぶと、スライド比率への<br>自動フィットを確認できます</p></div>
      <div id="fitui" style="display:none;flex-direction:column;gap:14px;height:100%">
        <div class="ph">スライドへの自動フィット</div>
        <div class="fitbox"><div class="fit-phone"><div class="img" id="fitimg"></div><div class="safe"></div></div></div>
        <div class="ratio"><button class="on">9:16 縦</button><button>1:1</button><button>16:9</button></div>
        <div class="ctrl"><label>フォーカス位置<span id="fv">中央</span></label><input type="range" id="focus" min="0" max="100" value="50" /></div>
        <div class="ctrl"><label>ズーム<span id="zv">100%</span></label><input type="range" id="zoom" min="100" max="200" value="100" /></div>
        <button class="btn btn-primary btn-block apply">この素材を使う</button>
      </div>
    </div>
  </div>
</div>

<script>
  const photo = ['#0b1f3a,#0e7490','#0284c7,#06b6d4','#0e7490,#22d3ee','#1b3a61,#0284c7','#0f2c52,#0e7490','#07142a,#0e5d80','#0b1220,#1b3a61','#0e7490,#16a34a','#0284c7,#0b1f3a','#16a34a,#22d3ee','#0b1f3a,#1b3a61','#0e5d80,#22d3ee'];
  const grad = ['#0ea5e9,#06b6d4','#7c3aed,#0284c7','#f59e0b,#ef4444','#16a34a,#22d3ee','#0b1f3a,#0e7490','#e11d48,#f59e0b','#06b6d4,#0ea5e9','#0f2c52,#0e7490'];
  const ghead = { upload: 'アップロード済み', photo: 'ストック写真 · ビジネス/抽象', grad: 'グラデーション背景', icon: 'ラインアイコン', people: '人物・ライフスタイル' };
  const icons = ['#i-bolt','#i-img','#i-user','#i-search','#i-up','#i-grad','#i-shapes','#i-check','#i-pick','#i-bolt','#i-user','#i-img'];
  const agrid = document.getElementById('agrid');
  let cat = 'photo';

  function build() {
    document.getElementById('ghead').textContent = ghead[cat];
    let html = '';
    if (cat === 'icon') {
      html = icons.concat(icons).map((ic, i) => `<div class="asset ico" data-bg="" data-i="${i}"><svg viewBox="0 0 24 24"><use href="${ic}"/></svg><div class="ck"><svg viewBox="0 0 24 24"><use href="#i-check"/></svg></div></div>`).join('');
    } else if (cat === 'upload') {
      html = photo.slice(0, 3).map((g, i) => `<div class="asset" data-bg="linear-gradient(150deg,${g})" data-i="${i}" style="background:linear-gradient(150deg,${g})"><div class="ck"><svg viewBox="0 0 24 24"><use href="#i-check"/></svg></div></div>`).join('');
    } else {
      const set = cat === 'grad' ? grad : photo;
      html = set.concat(set).map((g, i) => `<div class="asset" data-bg="linear-gradient(150deg,${g})" data-i="${i}" style="background:linear-gradient(150deg,${g})"><div class="ck"><svg viewBox="0 0 24 24"><use href="#i-check"/></svg></div></div>`).join('');
    }
    agrid.innerHTML = html;
    agrid.querySelectorAll('.asset').forEach((el) => el.addEventListener('click', () => {
      agrid.querySelectorAll('.asset').forEach((x) => x.classList.remove('on'));
      el.classList.add('on');
      const bg = el.dataset.bg;
      document.getElementById('empty').style.display = 'none';
      const ui = document.getElementById('fitui'); ui.style.display = 'flex';
      document.getElementById('fitimg').style.background = bg || 'var(--surface-2)';
    }));
  }
  build();

  document.getElementById('cats').addEventListener('click', (e) => {
    const b = e.target.closest('.cat'); if (!b) return;
    document.querySelectorAll('.cat').forEach((x) => x.classList.remove('on')); b.classList.add('on');
    cat = b.dataset.c; build();
    document.getElementById('empty').style.display = 'flex'; document.getElementById('fitui').style.display = 'none';
  });
  const img = document.getElementById('fitimg');
  const focus = document.getElementById('focus'), zoom = document.getElementById('zoom');
  focus.addEventListener('input', () => { img.style.backgroundPosition = focus.value + '% 50%'; document.getElementById('fv').textContent = focus.value < 34 ? '左' : focus.value > 66 ? '右' : '中央'; });
  zoom.addEventListener('input', () => { img.style.transform = 'scale(' + (zoom.value / 100) + ')'; document.getElementById('zv').textContent = zoom.value + '%'; });
  document.querySelectorAll('.ratio button').forEach((b, i, all) => b.addEventListener('click', () => { all.forEach(x => x.classList.remove('on')); b.classList.add('on'); }));
</script>
</body>
</html>
