<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D-Swipe — マーケット</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="c-system/tokens.css" />
<link rel="stylesheet" href="c-system/components.css" />
<style>
  body { margin: 0; font-family: var(--font); background: var(--canvas); color: var(--text); -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  .wrap { max-width: 1140px; margin: 0 auto; padding: 0 24px; }

  .pubnav { position: sticky; top: 0; z-index: 40; background: rgba(255,255,255,.85); backdrop-filter: blur(14px); border-bottom: 1px solid var(--line); }
  .pubnav-in { max-width: 1140px; margin: 0 auto; padding: 0 24px; height: 60px; display: flex; align-items: center; gap: 16px; }
  .pubnav .logo { display: flex; align-items: center; gap: 9px; font-size: 17px; font-weight: 800; letter-spacing: -.02em; color: var(--ink); }
  .pubnav .nlinks { display: flex; gap: 2px; margin-left: 8px; }
  .pubnav .nlinks a { font-size: 13.5px; font-weight: 600; color: var(--text-2); padding: 8px 12px; border-radius: 9px; }
  .pubnav .nlinks a:hover { background: var(--surface-2); color: var(--ink); }
  .pubnav .nlinks a.on { color: var(--brand); background: var(--surface-tint); }
  .pubnav .right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .pubnav .login { font-size: 13.5px; font-weight: 600; color: var(--text-2); padding: 8px 12px; border-radius: 9px; }
  .burger { display: none; background: none; border: none; cursor: pointer; color: var(--ink); }

  .disc-head { background: radial-gradient(700px 320px at 80% -30%, #0e7490 0%, transparent 60%), linear-gradient(150deg, #0b1f3a, #0f2c52); color: #fff; }
  .disc-head-in { max-width: 1140px; margin: 0 auto; padding: 38px 24px 30px; }
  .disc-head h1 { font-size: 32px; font-weight: 800; letter-spacing: -.03em; margin: 0; }
  .disc-head p { font-size: 14.5px; color: #bcd3ee; margin: 10px 0 0; }
  .searchbar { margin-top: 22px; max-width: 560px; position: relative; }
  .searchbar svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 19px; height: 19px; color: var(--muted); }
  .searchbar input { width: 100%; font-family: var(--font); font-size: 15px; color: var(--ink); background: #fff; border: none; border-radius: 14px; padding: 14px 16px 14px 46px; box-shadow: var(--sh-md); }
  .searchbar input:focus { outline: none; box-shadow: 0 0 0 3px rgba(34,211,238,.4), var(--sh-md); }
  .cats { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
  .cat { font-family: var(--font); font-size: 13px; font-weight: 600; color: #cfe3f5; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16); border-radius: 999px; padding: 7px 14px; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .cat:hover { background: rgba(255,255,255,.16); }
  .cat.on { background: #fff; color: var(--ink); border-color: #fff; }

  .disc-body { display: grid; grid-template-columns: 1fr 304px; gap: 32px; padding: 28px 0 64px; }
  .sorts { display: flex; gap: 4px; margin-bottom: 18px; align-items: center; }
  .sort { font-family: var(--font); font-size: 13.5px; font-weight: 700; color: var(--muted); background: none; border: none; padding: 8px 14px; border-radius: 10px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .sort svg { width: 15px; height: 15px; }
  .sort.on { color: var(--brand); background: var(--surface-tint); }
  .count { margin-left: auto; font-size: 12.5px; color: var(--muted); }
  .count b { color: var(--ink); }

  .prod-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .pcard { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-xl); overflow: hidden; box-shadow: var(--sh-sm); transition: box-shadow .2s, transform .2s, border-color .2s; display: flex; flex-direction: column; }
  .pcard.hidden { display: none; }
  .pcard:hover { box-shadow: var(--sh-card); transform: translateY(-3px); border-color: var(--tint-border); }
  .pthumb { height: 130px; position: relative; cursor: pointer; }
  .pthumb .cat-badge { position: absolute; top: 10px; left: 10px; font-size: 10.5px; font-weight: 700; color: #fff; background: rgba(11,31,58,.5); backdrop-filter: blur(4px); padding: 3px 9px; border-radius: 999px; }
  .pthumb .best { position: absolute; top: 10px; right: 10px; font-size: 10.5px; font-weight: 800; color: #fff; background: var(--grad-brand); padding: 3px 9px; border-radius: 999px; }
  .pbody { padding: 14px 15px 15px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .pttl { font-size: 14.5px; font-weight: 700; color: var(--ink); line-height: 1.4; cursor: pointer; }
  .pttl:hover { color: var(--brand); }
  .pseller { display: flex; align-items: center; gap: 7px; }
  .pseller .av { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #042032; flex-shrink: 0; }
  .pseller .nm { font-size: 12px; color: var(--text-2); font-weight: 600; }
  .pfoot { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 6px; }
  .pprice { font-size: 18px; font-weight: 800; color: var(--brand); font-variant-numeric: tabular-nums; }
  .pprice small { font-size: 12px; }
  .psales { font-size: 11.5px; color: var(--muted); display: inline-flex; align-items: center; gap: 4px; }
  .psales svg { width: 13px; height: 13px; color: #f59e0b; }
  .empty { grid-column: 1 / -1; text-align: center; padding: 50px; color: var(--muted); font-size: 14px; }

  .side-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-xl); padding: 18px; box-shadow: var(--sh-sm); margin-bottom: 18px; }
  .side-card h3 { font-size: 13px; font-weight: 700; color: var(--ink); margin: 0 0 14px; display: flex; align-items: center; gap: 7px; }
  .side-card h3 svg { width: 16px; height: 16px; color: var(--brand); }
  .catrow { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; font-size: 13.5px; color: var(--text); cursor: pointer; }
  .catrow + .catrow { border-top: 1px solid var(--line-2); }
  .catrow:hover { color: var(--brand); }
  .catrow .n { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .creator { display: flex; align-items: center; gap: 11px; padding: 8px 0; }
  .creator + .creator { border-top: 1px solid var(--line-2); }
  .creator .cav { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #042032; font-size: 14px; }
  .creator .cn { font-size: 13px; font-weight: 700; color: var(--ink); }
  .creator .cf { font-size: 11.5px; color: var(--muted); }
  .cta-card { background: linear-gradient(160deg,#0b1f3a,#0f2c52); border-radius: var(--r-xl); padding: 20px; color: #fff; box-shadow: var(--sh-card); }
  .cta-card b { font-size: 16px; font-weight: 800; display: block; }
  .cta-card p { font-size: 12.5px; color: #bcd3ee; margin: 8px 0 16px; line-height: 1.6; }

  @media (max-width: 940px) { .disc-body { grid-template-columns: 1fr; } .sidebar { display: none; } }
  @media (max-width: 760px) { .prod-grid { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 540px) { .pubnav .nlinks { display: none; } .burger { display: inline-flex; } .prod-grid { grid-template-columns: 1fr; } .disc-head h1 { font-size: 26px; } }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <g id="i-search" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></g>
  <g id="i-fire" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c1 3-1 4-1 6a3 3 0 006 0c0-1 0-2-1-3 3 2 5 5 5 8a7 7 0 01-14 0c0-4 3-6 5-11z"/></g>
  <g id="i-star" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.6 5.6L21 9.4l-4.6 4.3L17.6 21 12 17.6 6.4 21l1.2-7.3L3 9.4l6.4-.8z"/></g>
  <g id="i-clock" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></g>
  <g id="i-tag" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12V4h8l9 9-8 8z"/><circle cx="7.5" cy="7.5" r="1.3" fill="currentColor"/></g>
  <g id="i-users" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19a5.5 5.5 0 0111 0"/><path d="M16 5.5a3 3 0 010 5.8M16.5 19a5.5 5.5 0 00-3-4.9"/></g>
  <g id="i-arrow" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></g>
  <g id="i-burger" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></g>
</defs></svg>

<nav class="pubnav">
  <div class="pubnav-in">
    <a class="logo" href="D-Swipe Top (Swipe).html">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><defs><linearGradient id="pl" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#0ea5e9"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs><rect x="1" y="1" width="38" height="38" rx="11" fill="#0b1f3a"/><path d="M11 13h6c4 0 7 2.8 7 7s-3 7-7 7h-6z" fill="none" stroke="url(#pl)" stroke-width="2.6" stroke-linejoin="round"/><path d="M25 20l6-5m-6 5l6 5" stroke="url(#pl)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      D<span style="color:var(--brand)">-</span>Swipe
    </a>
    <div class="nlinks">
      <a href="D-Swipe Discover.html">発見</a>
      <a class="on" href="D-Swipe Marketplace.html">マーケット</a>
    </div>
    <div class="right">
      <span class="points">◆ 12,500 P</span>
      <a class="login" href="D-Swipe Login.html">ログイン</a>
    </div>
    <button class="burger" aria-label="メニュー"><svg width="24" height="24" viewBox="0 0 24 24"><use href="#i-burger"/></svg></button>
  </div>
</nav>

<header class="disc-head">
  <div class="disc-head-in">
    <h1>マーケット</h1>
    <p>クリエイターのノウハウ・テンプレート・講座を、ポイントで購入。気になる商品を探そう。</p>
    <div class="searchbar"><svg viewBox="0 0 24 24"><use href="#i-search"/></svg><input id="search" placeholder="商品・クリエイターで検索" /></div>
    <div class="cats" id="cats">
      <button class="cat on" data-cat="all">すべて</button>
      <button class="cat" data-cat="講座">講座・コース</button>
      <button class="cat" data-cat="テンプレート">テンプレート</button>
      <button class="cat" data-cat="ツール">ツール・シート</button>
      <button class="cat" data-cat="サポート">サポート</button>
    </div>
  </div>
</header>

<div class="wrap disc-body">
  <main>
    <div class="sorts" id="sorts">
      <button class="sort on" data-sort="best"><svg viewBox="0 0 24 24"><use href="#i-fire"/></svg>売れ筋</button>
      <button class="sort" data-sort="new"><svg viewBox="0 0 24 24"><use href="#i-clock"/></svg>新着</button>
      <button class="sort" data-sort="rate"><svg viewBox="0 0 24 24"><use href="#i-star"/></svg>高評価</button>
      <span class="count"><b id="cnt">0</b> 件</span>
    </div>
    <div class="prod-grid" id="grid"></div>
  </main>

  <aside class="sidebar">
    <div class="side-card">
      <h3><svg viewBox="0 0 24 24"><use href="#i-tag"/></svg>人気のカテゴリ</h3>
      <div class="catrow" data-cat="講座">講座・コース<span class="n">42</span></div>
      <div class="catrow" data-cat="テンプレート">テンプレート<span class="n">31</span></div>
      <div class="catrow" data-cat="ツール">ツール・シート<span class="n">18</span></div>
      <div class="catrow" data-cat="サポート">サポート<span class="n">9</span></div>
    </div>
    <div class="side-card">
      <h3><svg viewBox="0 0 24 24"><use href="#i-users"/></svg>売れ筋クリエイター</h3>
      <a class="creator" href="D-Swipe Creator Profile.html"><span class="cav" style="background:linear-gradient(135deg,#22d3ee,#0284c7)">山</span><div class="cinfo"><div class="cn">山田 太郎</div><div class="cf">142件販売</div></div></a>
      <a class="creator" href="D-Swipe Creator Profile.html"><span class="cav" style="background:linear-gradient(135deg,#16a34a,#22d3ee)">け</span><div class="cinfo"><div class="cn">鈴木 けん</div><div class="cf">98件販売</div></div></a>
      <a class="creator" href="D-Swipe Creator Profile.html"><span class="cav" style="background:linear-gradient(135deg,#f59e0b,#ef4444)">A</span><div class="cinfo"><div class="cn">佐藤 あや</div><div class="cf">76件販売</div></div></a>
    </div>
    <div class="cta-card">
      <b>あなたも販売する</b>
      <p>作ったLPやノウハウを商品化。ポイント決済で受け取れます。</p>
      <a class="btn btn-primary btn-block btn-sm" href="D-Swipe Login.html">販売者になる<svg viewBox="0 0 24 24"><use href="#i-arrow"/></svg></a>
    </div>
  </aside>
</div>

<script>
  const DATA = [
    { t: "スワイプ集客マスター講座", cat: "講座", au: "山田 太郎", av: "山,#22d3ee,#0284c7", bg: "linear-gradient(150deg,#0b1f3a,#0e7490)", p: 9800, s: 142, r: 4.8, new: 3, best: true },
    { t: "LPテンプレート20選", cat: "テンプレート", au: "山田 太郎", av: "山,#22d3ee,#0284c7", bg: "linear-gradient(150deg,#0284c7,#06b6d4)", p: 3500, s: 210, r: 4.9, new: 1, best: true },
    { t: "ファネル設計シート", cat: "ツール", au: "山田 太郎", av: "山,#22d3ee,#0284c7", bg: "linear-gradient(150deg,#7c3aed,#0284c7)", p: 1200, s: 88, r: 4.6, new: 2, best: false },
    { t: "売れる文章 添削サポート", cat: "サポート", au: "鈴木 けん", av: "け,#16a34a,#22d3ee", bg: "linear-gradient(150deg,#0e7490,#22d3ee)", p: 12000, s: 34, r: 5.0, new: 6, best: false },
    { t: "X運用の教科書", cat: "講座", au: "鈴木 けん", av: "け,#16a34a,#22d3ee", bg: "linear-gradient(150deg,#0e7490,#0b1f3a)", p: 4800, s: 98, r: 4.7, new: 5, best: true },
    { t: "Instagram投稿テンプレ50", cat: "テンプレート", au: "佐藤 あや", av: "A,#f59e0b,#ef4444", bg: "linear-gradient(150deg,#1b3a61,#0284c7)", p: 2800, s: 156, r: 4.8, new: 4, best: false },
    { t: "副業ロードマップ講座", cat: "講座", au: "佐藤 あや", av: "A,#f59e0b,#ef4444", bg: "linear-gradient(150deg,#0b1f3a,#1b3a61)", p: 6800, s: 76, r: 4.5, new: 7, best: false },
    { t: "CV改善チェックリスト", cat: "ツール", au: "高橋 じん", av: "じ,#0ea5e9,#22d3ee", bg: "linear-gradient(150deg,#0f2c52,#0e7490)", p: 980, s: 245, r: 4.4, new: 8, best: true },
    { t: "個別コンサル（60分）", cat: "サポート", au: "高橋 じん", av: "じ,#0ea5e9,#22d3ee", bg: "linear-gradient(150deg,#0284c7,#0b1f3a)", p: 15000, s: 22, r: 5.0, new: 9, best: false },
  ];

  const grid = document.getElementById('grid');
  let activeCat = 'all', activeSort = 'best', q = '';

  function av(spec) { const [ch, c1, c2] = spec.split(','); return { ch, bg: `linear-gradient(135deg,${c1},${c2})` }; }
  function fmt(n) { return n.toLocaleString(); }

  function build() {
    let rows = DATA.slice();
    if (activeCat !== 'all') rows = rows.filter((d) => d.cat === activeCat);
    if (q) rows = rows.filter((d) => (d.t + d.au + d.cat).toLowerCase().includes(q.toLowerCase()));
    if (activeSort === 'best') rows.sort((a, b) => b.s - a.s);
    else if (activeSort === 'new') rows.sort((a, b) => b.new - a.new);
    else rows.sort((a, b) => b.r - a.r);

    document.getElementById('cnt').textContent = rows.length;
    if (!rows.length) { grid.innerHTML = '<div class="empty">該当する商品が見つかりませんでした。</div>'; return; }

    grid.innerHTML = rows.map((d) => {
      const a = av(d.av);
      const best = (activeSort === 'best' && d.best) ? '<span class="best">人気</span>' : '';
      return `<article class="pcard">
        <div class="pthumb" style="background:${d.bg}" onclick="location.href='D-Swipe Product Detail.html'"><span class="cat-badge">${d.cat}</span>${best}</div>
        <div class="pbody">
          <div class="pttl" onclick="location.href='D-Swipe Product Detail.html'">${d.t}</div>
          <a class="pseller" href="D-Swipe Creator Profile.html"><span class="av" style="background:${a.bg}">${a.ch}</span><span class="nm">${d.au}</span></a>
          <div class="pfoot"><span class="pprice">${fmt(d.p)}<small> P</small></span><span class="psales"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><use href="#i-fire"/></svg>${d.s}件</span></div>
        </div>
      </article>`;
    }).join('');
  }
  build();

  document.getElementById('cats').addEventListener('click', (e) => {
    const b = e.target.closest('.cat'); if (!b) return;
    document.querySelectorAll('.cat').forEach((c) => c.classList.toggle('on', c === b));
    activeCat = b.dataset.cat; build();
  });
  document.getElementById('sorts').addEventListener('click', (e) => {
    const b = e.target.closest('.sort'); if (!b) return;
    document.querySelectorAll('.sort').forEach((c) => c.classList.toggle('on', c === b));
    activeSort = b.dataset.sort; build();
  });
  document.getElementById('search').addEventListener('input', (e) => { q = e.target.value; build(); });
  document.querySelectorAll('.catrow').forEach((r) => r.addEventListener('click', () => {
    const cat = r.dataset.cat;
    const chip = [...document.querySelectorAll('.cat')].find((c) => c.dataset.cat === cat);
    if (chip) chip.click();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }));
</script>
</body>
</html>
