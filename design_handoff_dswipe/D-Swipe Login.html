<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D-Swipe — ログイン</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="c-system/tokens.css" />
<link rel="stylesheet" href="c-system/components.css" />
<style>
  body { margin: 0; font-family: var(--font); background: var(--canvas); -webkit-font-smoothing: antialiased; }
  .auth { min-height: 100vh; display: grid; grid-template-columns: 1.05fr 1fr; }

  /* left navy brand panel */
  .brand-panel { background:
      radial-gradient(700px 460px at 25% 10%, rgba(34,211,238,.22), transparent 60%),
      linear-gradient(160deg, #0b1f3a 0%, #0f2c52 60%, #0b2742 100%);
    color: #fff; padding: 56px 56px 48px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .brand-panel::after { content: ""; position: absolute; right: -140px; bottom: -160px; width: 460px; height: 460px; border-radius: 50%; background: radial-gradient(circle, rgba(6,182,212,.22), transparent 65%); }
  .bp-logo { display: flex; align-items: center; gap: 11px; font-size: 20px; font-weight: 800; letter-spacing: -.02em; color: #fff; text-decoration: none; }
  .bp-mid { margin-top: auto; position: relative; z-index: 1; }
  .bp-h { font-size: 38px; font-weight: 800; letter-spacing: -.03em; line-height: 1.2; }
  .bp-h .g { background: linear-gradient(120deg,#67e8f9,#38bdf8); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .bp-sub { font-size: 15px; line-height: 1.8; color: #bcd3ee; margin: 18px 0 0; max-width: 40ch; }
  .bp-points { margin: 30px 0 0; display: flex; flex-direction: column; gap: 14px; }
  .bp-points div { display: flex; align-items: center; gap: 12px; font-size: 14px; color: #dbe8f7; }
  .bp-points .c { width: 28px; height: 28px; border-radius: 9px; background: rgba(34,211,238,.16); color: #67e8f9; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .bp-points .c svg { width: 16px; height: 16px; }
  .bp-stats { position: relative; z-index: 1; margin-top: 40px; display: flex; gap: 28px; padding-top: 26px; border-top: 1px solid rgba(255,255,255,.12); }
  .bp-stats .n { font-size: 24px; font-weight: 800; letter-spacing: -.02em; }
  .bp-stats .l { font-size: 12px; color: var(--on-navy-muted); margin-top: 2px; }

  /* right form */
  .form-panel { display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
  .form-box { width: 100%; max-width: 400px; }
  .fb-head { margin-bottom: 28px; }
  .fb-head h1 { font-size: 28px; font-weight: 800; letter-spacing: -.025em; color: var(--ink); margin: 0; }
  .fb-head p { font-size: 14px; color: var(--text-2); margin: 8px 0 0; }
  .seg-tabs { display: inline-flex; background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-md); padding: 3px; margin-bottom: 24px; width: 100%; }
  .seg-tabs button { flex: 1; font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--muted); border: none; background: transparent; padding: 9px; border-radius: 9px; cursor: pointer; }
  .seg-tabs button.active { background: var(--surface); color: var(--ink); box-shadow: var(--sh-xs); }
  .form-stack { display: flex; flex-direction: column; gap: 16px; }
  .row-between { display: flex; align-items: center; justify-content: space-between; }
  .link { font-size: 13px; font-weight: 600; color: var(--brand); cursor: pointer; }
  .or { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 12.5px; }
  .or::before, .or::after { content: ""; height: 1px; flex: 1; background: var(--line); }
  .google { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--ink); background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); padding: 12px; cursor: pointer; transition: background .15s, border-color .15s; }
  .google:hover { background: var(--surface-2); border-color: var(--tint-border); }
  .foot-note { text-align: center; font-size: 13px; color: var(--text-2); margin-top: 22px; }
  .foot-note a { color: var(--brand); font-weight: 600; }
  .back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); margin-top: 18px; }

  @media (max-width: 880px) {
    .auth { grid-template-columns: 1fr; }
    .brand-panel { padding: 40px 32px; min-height: 280px; }
    .bp-points, .bp-stats { display: none; }
    .bp-mid { margin-top: 24px; }
    .bp-h { font-size: 28px; }
  }
  @media (max-width: 440px) { .brand-panel { padding: 32px 24px; min-height: 220px; } }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <g id="i-bolt" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L4 14h7l-1 8 9-12h-7z"/></g>
  <g id="i-spark" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4l1.6 4.4L18 10l-4.4 1.6L12 16l-1.6-4.4L6 10l4.4-1.6z"/></g>
  <g id="i-chart" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l3-4 3 3 4-6"/></g>
  <g id="i-mail" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M4 7l8 6 8-6"/></g>
  <g id="i-lock" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0v3"/></g>
  <g id="i-arrow-l" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 6l-6 6 6 6"/></g>
</defs></svg>

<div class="auth">
  <!-- LEFT brand -->
  <div class="brand-panel">
    <a class="bp-logo" href="D-Swipe Top (Landing).html">
      <svg width="34" height="34" viewBox="0 0 40 40" fill="none"><defs><linearGradient id="bl" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#0ea5e9"/></linearGradient></defs><rect x="1" y="1" width="38" height="38" rx="11" fill="#fff" fill-opacity=".08" stroke="rgba(255,255,255,.2)"/><path d="M11 13h6c4 0 7 2.8 7 7s-3 7-7 7h-6z" fill="none" stroke="url(#bl)" stroke-width="2.6" stroke-linejoin="round"/><path d="M25 20l6-5m-6 5l6 5" stroke="url(#bl)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      D<span style="color:var(--cyan-400)">-</span>Swipe
    </a>
    <div class="bp-mid">
      <div class="bp-h">スワイプで、<br><span class="g">伝わる</span>。売れる。</div>
      <p class="bp-sub">ノーコード × AI で、情報商材のスワイプ型LPを数分で。公開から改善まで、すべてここで。</p>
      <div class="bp-points">
        <div><span class="c"><svg viewBox="0 0 24 24"><use href="#i-bolt"/></svg></span>最短3分でLPを公開</div>
        <div><span class="c"><svg viewBox="0 0 24 24"><use href="#i-spark"/></svg></span>AIが構成を自動提案</div>
        <div><span class="c"><svg viewBox="0 0 24 24"><use href="#i-chart"/></svg></span>閲覧・CTAをデータで可視化</div>
      </div>
    </div>
    <div class="bp-stats">
      <div><div class="n">2,400+</div><div class="l">公開LP</div></div>
      <div><div class="n">+18%</div><div class="l">平均CV改善</div></div>
      <div><div class="n">3分</div><div class="l">公開まで</div></div>
    </div>
  </div>

  <!-- RIGHT form -->
  <div class="form-panel">
    <div class="form-box">
      <div class="fb-head">
        <h1>おかえりなさい</h1>
        <p>アカウントにログインして続けましょう</p>
      </div>

      <div class="seg-tabs">
        <button class="active">ログイン</button>
        <button>新規登録</button>
      </div>

      <form class="form-stack" onsubmit="return false">
        <div class="field">
          <label class="field-label">メールアドレス</label>
          <div class="input-icon"><svg viewBox="0 0 24 24"><use href="#i-mail"/></svg><input class="input" type="email" placeholder="your@email.com" /></div>
        </div>
        <div class="field">
          <div class="row-between"><label class="field-label">パスワード</label><span class="link">お忘れですか？</span></div>
          <div class="input-icon"><svg viewBox="0 0 24 24"><use href="#i-lock"/></svg><input class="input" type="password" placeholder="••••••••" /></div>
        </div>
        <button class="btn btn-primary btn-lg btn-block" type="submit" style="margin-top:4px">ログイン</button>
      </form>

      <div class="or">または</div>

      <button class="google">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 01-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 009 18z"/><path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 010-3.44V4.95H.96a9 9 0 000 8.1l3-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.59A9 9 0 00.96 4.95l3 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
        Googleで続ける
      </button>

      <div class="foot-note">アカウントをお持ちでない方は <a href="#">新規登録</a></div>
      <a class="back" href="D-Swipe Top (Landing).html"><svg width="16" height="16" viewBox="0 0 24 24"><use href="#i-arrow-l"/></svg>ホームに戻る</a>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll('.seg-tabs button').forEach((b, i, all) => {
    b.addEventListener('click', () => {
      all.forEach(x => x.classList.remove('active')); b.classList.add('active');
      const reg = i === 1;
      document.querySelector('.fb-head h1').textContent = reg ? 'はじめまして' : 'おかえりなさい';
      document.querySelector('.fb-head p').textContent = reg ? '無料でアカウントを作成しましょう' : 'アカウントにログインして続けましょう';
      document.querySelector('.btn-primary').textContent = reg ? '無料で登録する' : 'ログイン';
      document.querySelector('.foot-note').innerHTML = reg ? 'すでにアカウントをお持ちの方は <a href="#">ログイン</a>' : 'アカウントをお持ちでない方は <a href="#">新規登録</a>';
    });
  });
</script>
</body>
</html>
