<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D-Swipe — デザイン方向性レビュー</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="directions.css" />
<style>
  html, body { margin: 0; height: 100%; }
  /* ---- intro / brief panel ---- */
  .brief { font-family: "Noto Sans JP", system-ui, sans-serif; height: 100%; background: #ffffff; color: #0f172a; display: flex; flex-direction: column; }
  .brief * { box-sizing: border-box; }
  .brief-top { padding: 34px 40px 26px; background: linear-gradient(135deg, #0b1f3a 0%, #0f2c52 60%, #0e7490 130%); color: #eaf2fb; }
  .brief-kicker { font-size: 12px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: #7fd6f0; }
  .brief-h1 { font-size: 34px; font-weight: 800; letter-spacing: -.03em; line-height: 1.1; margin: 12px 0 10px; }
  .brief-sub { font-size: 15px; line-height: 1.7; color: #b7cce4; max-width: 60ch; }
  .brief-body { padding: 26px 40px 34px; display: grid; grid-template-columns: 1fr 1fr; gap: 26px 40px; flex: 1; }
  .brief-col h3 { font-size: 12px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #0284c7; margin: 0 0 12px; }
  .brief-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 9px; }
  .brief-list li { font-size: 13.5px; line-height: 1.6; color: #334155; padding-left: 18px; position: relative; }
  .brief-list li::before { content: ""; position: absolute; left: 0; top: 8px; width: 7px; height: 7px; border-radius: 50%; background: #0ea5e9; }
  .brief-list.warn li::before { background: #f59e0b; }
  .brief-list b { color: #0f172a; font-weight: 700; }
  .brief-list code, .brief code { font-family: ui-monospace, "SF Mono", monospace; font-size: 11.5px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 5px; padding: 1px 5px; color: #0e7490; }
  .brief-foot { grid-column: 1 / -1; border-top: 1px solid #e7eef6; padding-top: 18px; display: flex; gap: 26px; flex-wrap: wrap; }
  .brief-foot div { flex: 1 1 240px; }
  .brief-foot h4 { font-size: 12px; font-weight: 700; color: #0b1f3a; margin: 0 0 6px; }
  .brief-foot p { font-size: 12.5px; line-height: 1.6; color: #64748b; margin: 0; }
  .pill3 { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: #0284c7; background: #eff8ff; border: 1px solid #c7e8fc; border-radius: 999px; padding: 4px 11px; margin: 2px 6px 2px 0; }

  /* ---- placeholder artboard ---- */
  .ph { font-family: "Noto Sans JP", system-ui, sans-serif; height: 100%; background: repeating-linear-gradient(135deg, #f8fafc, #f8fafc 14px, #f3f6fa 14px, #f3f6fa 28px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; text-align: center; padding: 40px; border: 1.5px dashed #cbd6e3; }
  .ph-badge { font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #0284c7; background: #eff8ff; border: 1px solid #c7e8fc; border-radius: 999px; padding: 5px 13px; }
  .ph-title { font-size: 22px; font-weight: 700; letter-spacing: -.02em; color: #0f172a; }
  .ph-desc { font-size: 13px; line-height: 1.7; color: #64748b; max-width: 40ch; }
  .ph-route { font-size: 12px; font-weight: 600; color: #0b1f3a; background: #fff; border: 1px solid #e2e8f0; border-radius: 7px; padding: 5px 11px; font-family: ui-monospace, monospace; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="direction-cards.jsx"></script>

<script type="text/babel">
const { DirA, DirB, DirC } = window;

function Brief() {
  return (
    <div className="brief">
      <div className="brief-top">
        <div className="brief-kicker">D-Swipe · UI Redesign</div>
        <div className="brief-h1">デザイン方向性レビュー</div>
        <div className="brief-sub">
          現状の課題を整理し、合意済みの土台の上に「洗練・信頼感のフィンテック」3案を用意しました。
          まず方向性を1つ選んでください。選んだ案でデザインシステム仕様＋優先画面（トップ／公開LPビュー）を仕上げます。
        </div>
      </div>
      <div className="brief-body">
        <div className="brief-col">
          <h3>現状の課題（コードから確認）</h3>
          <ul className="brief-list warn">
            <li><b>トーン不統一</b>：全体がダークのグラスモーフィズム。<code>globals.css</code>に紫×ピンクのトークンがあるが、各画面は <b>gray-900＋blue-600</b> に逆戻り。</li>
            <li><b>ブランド揺れ</b>：トップ／ログインの見出しが <b>「SwipeLaunch」</b>、ロゴは <b>「D-swipe」</b>。名称が不一致。</li>
            <li><b>場当たり的</b>：ナビが <code>navLinks.tsx</code> の Heroicons ではなく <b>絵文字（📊➕📦）</b> をハードコード。</li>
            <li><b>システム不在</b>：色・余白・角丸・影・コンポーネント仕様が未整備。</li>
          </ul>
        </div>
        <div className="brief-col">
          <h3>合意済みの土台（ご回答より）</h3>
          <ul className="brief-list">
            <li><b>一貫したライト基調</b> ＋ シアン/スカイのアクセント</li>
            <li>トーンは <b>Linear / Stripe の上質さ</b>（フィンテック）</li>
            <li>書体は <b>Noto Sans JP</b> を継続（可読性重視）</li>
            <li>ロゴマークは <b>作り直して提案</b></li>
            <li>ダッシュボードは <b>現状の情報密度を維持</b></li>
            <li>探索軸：<b>色・コンポーネント形・タイポ・レイアウト・スワイプ編集UX</b></li>
          </ul>
        </div>
        <div className="brief-foot">
          <div>
            <h4>A · Clarity</h4>
            <p>白と余白の王道。やわらかい影、広い角丸。いちばん安全で信頼感が高い。</p>
          </div>
          <div>
            <h4>B · Precision</h4>
            <p>1pxシャープ、小さめ角丸、高密度。プロの編集ツールの精度。</p>
          </div>
          <div>
            <h4>C · Momentum</h4>
            <p>紺クローム×シアングラデ。CTAに勢い。コンバージョン志向。</p>
          </div>
          <div style={{ flexBasis: "100%" }}>
            <span className="pill3">Tailwind v4 トークンで納品</span>
            <span className="pill3">375 / 768 / 1280 レスポンシブ</span>
            <span className="pill3">アクセシビリティ配慮（コントラスト・フォーカス）</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function Placeholder({ badge, title, desc, route }) {
  return (
    <div className="ph">
      <span className="ph-badge">{badge}</span>
      <span className="ph-title">{title}</span>
      <span className="ph-desc">{desc}</span>
      <span className="ph-route">{route}</span>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="intro" title="はじめに — 方向性レビュー" subtitle="現状の課題 → 合意済みの土台 → 3案。まず1案を選んでください。">
        <DCArtboard id="brief" label="ブリーフ" width={780} height={600}><Brief /></DCArtboard>
      </DCSection>

      <DCSection id="directions" title="方向性 3案" subtitle="同じ土台（ライト基調・シアン・Noto Sans JP）／異なる人格。角丸・影・密度・クローム・タイポで差をつけています。">
        <DCArtboard id="a" label="A · Clarity（王道・Stripe風）" width={600} height={1460}><DirA /></DCArtboard>
        <DCArtboard id="b" label="B · Precision（精密・Linear風）" width={600} height={1460}><DirB /></DCArtboard>
        <DCArtboard id="c" label="C · Momentum（力強い・転換志向）" width={600} height={1460}><DirC /></DCArtboard>
      </DCSection>

      <DCSection id="next" title="このあと作る画面（選んだ案で）" subtitle="優先：公開系。トップ（/）と公開LPビューから着手します。">
        <DCArtboard id="landing" label="トップLP /" width={600} height={720}>
          <Placeholder badge="Next · 優先" title="トップページ" desc="ヒーロー、価値訴求、スワイプ体験のデモ、料金、CTA。選んだ方向性のシステムで実装します。" route="/" />
        </DCArtboard>
        <DCArtboard id="view" label="公開LPビュー" width={600} height={720}>
          <Placeholder badge="Next · 優先" title="公開LPビュー" desc="購入者が見るスワイプ型LP。Swiper のフルブリード体験＋CTA／フォームブロック。" route="/view/[slug]" />
        </DCArtboard>
        <DCArtboard id="login" label="ログイン" width={600} height={720}>
          <Placeholder badge="Next" title="ログイン / 新規登録" desc="ダークから一貫したライト基調へ。認証とダッシュボードのトーンを統一します。" route="/login · /register" />
        </DCArtboard>
        <DCArtboard id="dash" label="ダッシュボード" width={600} height={720}>
          <Placeholder badge="Next" title="ダッシュボード" desc="絵文字ナビを Heroicons へ。KPIサマリー＋LP一覧。情報密度は維持。" route="/dashboard" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
