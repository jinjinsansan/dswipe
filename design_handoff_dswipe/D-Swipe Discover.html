<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D-Swipe — 発見</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="c-system/tokens.css" />
<link rel="stylesheet" href="c-system/components.css" />
<style>
  body { margin: 0; font-family: var(--font); background: var(--canvas); color: var(--text); -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  .wrap { max-width: 1140px; margin: 0 auto; padding: 0 24px; }

  /* public nav */
  .pubnav { position: sticky; top: 0; z-index: 40; background: rgba(255,255,255,.85); backdrop-filter: blur(14px); border-bottom: 1px solid var(--line); }
  .pubnav-in { max-width: 1140px; margin: 0 auto; padding: 0 24px; height: 60px; display: flex; align-items: center; gap: 16px; }
  .pubnav .logo { display: flex; align-items: center; gap: 9px; font-size: 17px; font-weight: 800; letter-spacing: -.02em; color: var(--ink); }
  .pubnav .nlinks { display: flex; gap: 2px; margin-left: 8px; }
  .pubnav .nlinks a { font-size: 13.5px; font-weight: 600; color: var(--text-2); padding: 8px 12px; border-radius: 9px; }
  .pubnav .nlinks a:hover { background: var(--surface-2); color: var(--ink); }
  .pubnav .nlinks a.on { color: var(--brand); background: var(--surface-tint); }
  .pubnav .right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .pubnav .login { font-size: 13.5px; font-weight: 600; color: var(--text-2); padding: 8px 12px; border-radius: 9px; }
  .pubnav .login:hover { background: var(--surface-2); color: var(--ink); }
  .burger { display: none; background: none; border: none; cursor: pointer; color: var(--ink); }

  /* header band */
  .disc-head { background: radial-gradient(700px 320px at 80% -30%, #0e7490 0%, transparent 60%), linear-gradient(150deg, #0b1f3a, #0f2c52); color: #fff; }
  .disc-head-in { max-width: 1140px; margin: 0 auto; padding: 38px 24px 30px; }
  .disc-head h1 { font-size: 32px; font-weight: 800; letter-spacing: -.03em; margin: 0; }
  .disc-head p { font-size: 14.5px; color: #bcd3ee; margin: 10px 0 0; }
  .searchbar { margin-top: 22px; max-width: 560px; position: relative; }
  .searchbar svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 19px; height: 19px; color: var(--muted); }
  .searchbar input { width: 100%; font-family: var(--font); font-size: 15px; color: var(--ink); background: #fff; border: none; border-radius: 14px; padding: 14px 16px 14px 46px; box-shadow: var(--sh-md); }
  .searchbar input:focus { outline: none; box-shadow: 0 0 0 3px rgba(34,211,238,.4), var(--sh-md); }
  .cats { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
  .cat { font-family: var(--font); font-size: 13px; font-weight: 600; color: #cfe3f5; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16); border-radius: 999px; padding: 7px 14px; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .cat:hover { background: rgba(255,255,255,.16); }
  .cat.on { background: #fff; color: var(--ink); border-color: #fff; }

  /* body 2-col */
  .disc-body { display: grid; grid-template-columns: 1fr 304px; gap: 32px; padding: 28px 0 64px; }

  /* sort tabs */
  .sorts { display: flex; gap: 4px; margin-bottom: 18px; }
  .sort { font-family: var(--font); font-size: 13.5px; font-weight: 700; color: var(--muted); background: none; border: none; padding: 8px 14px; border-radius: 10px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .sort svg { width: 15px; height: 15px; }
  .sort.on { color: var(--brand); background: var(--surface-tint); }

  .feed-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .lpcard { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-xl); overflow: hidden; box-shadow: var(--sh-sm); transition: box-shadow .2s, transform .2s, border-color .2s; }
  .lpcard.hidden { display: none; }
  .lpcard:hover { box-shadow: var(--sh-card); transform: translateY(-3px); border-color: var(--tint-border); }
  .lpthumb { height: 150px; position: relative; display: flex; align-items: flex-end; padding: 14px; cursor: pointer; }
  .lpthumb .cat-badge { position: absolute; top: 10px; left: 10px; font-size: 10.5px; font-weight: 700; color: #fff; background: rgba(11,31,58,.5); backdrop-filter: blur(4px); padding: 3px 9px; border-radius: 999px; }
  .lpthumb .trend { position: absolute; top: 10px; right: 10px; font-size: 10.5px; font-weight: 800; color: #fde68a; background: rgba(245,158,11,.2); border: 1px solid rgba(245,158,11,.4); padding: 3px 8px; border-radius: 999px; display: inline-flex; align-items: center; gap: 4px; }
  .lpthumb .trend svg { width: 11px; height: 11px; }
  .lpthumb .htitle { color: #fff; font-size: 17px; font-weight: 800; letter-spacing: -.01em; line-height: 1.3; text-shadow: 0 2px 12px rgba(0,0,0,.35); }
  .lpbody { padding: 13px 15px 14px; }
  .lprow { display: flex; align-items: center; gap: 9px; }
  .lpav { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; }
  .lpauthor { font-size: 12.5px; color: var(--text-2); font-weight: 600; }
  .lpauthor:hover { color: var(--brand); }
  .lpmeta { margin-left: auto; display: flex; align-items: center; gap: 13px; font-size: 12px; color: var(--muted); }
  .lpmeta .v { display: inline-flex; align-items: center; gap: 4px; font-variant-numeric: tabular-nums; }
  .lpmeta .v svg { width: 14px; height: 14px; }
  .likebtn { display: inline-flex; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; font-family: var(--font); font-size: 12px; font-weight: 600; color: var(--muted); font-variant-numeric: tabular-nums; padding: 0; }
  .likebtn svg { width: 15px; height: 15px; }
  .likebtn.liked { color: #f43f5e; }
  .likebtn.liked svg { fill: #f43f5e; stroke: #f43f5e; }

  .empty { grid-column: 1 / -1; text-align: center; padding: 50px; color: var(--muted); font-size: 14px; }

  /* sidebar */
  .side-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-xl); padding: 18px; box-shadow: var(--sh-sm); margin-bottom: 18px; }
  .side-card h3 { font-size: 13px; font-weight: 700; letter-spacing: .04em; color: var(--ink); margin: 0 0 14px; display: flex; align-items: center; gap: 7px; }
  .side-card h3 svg { width: 16px; height: 16px; color: var(--brand); }
  .creator { display: flex; align-items: center; gap: 11px; padding: 8px 0; }
  .creator + .creator { border-top: 1px solid var(--line-2); }
  .creator .cav { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #042032; font-size: 15px; }
  .creator .cinfo { min-width: 0; flex: 1; }
  .creator .cn { font-size: 13px; font-weight: 700; color: var(--ink); }
  .creator .cf { font-size: 11.5px; color: var(--muted); }
  .fbtn { font-family: var(--font); font-size: 12px; font-weight: 700; color: var(--brand); background: var(--surface-tint); border: 1px solid var(--tint-border); border-radius: 999px; padding: 6px 13px; cursor: pointer; white-space: nowrap; }
  .fbtn.on { background: var(--surface-2); color: var(--muted); border-color: var(--line); }
  .tagcloud { display: flex; gap: 7px; flex-wrap: wrap; }
  .tagcloud span { font-size: 12px; font-weight: 600; color: var(--text-2); background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; padding: 5px 11px; cursor: pointer; }
  .tagcloud span:hover { color: var(--brand); border-color: var(--tint-border); }
  .cta-card { background: linear-gradient(160deg,#0b1f3a,#0f2c52); border-radius: var(--r-xl); padding: 20px; color: #fff; box-shadow: var(--sh-card); }
  .cta-card b { font-size: 16px; font-weight: 800; display: block; }
  .cta-card p { font-size: 12.5px; color: #bcd3ee; margin: 8px 0 16px; line-height: 1.6; }

  @media (max-width: 940px) {
    .disc-body { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }
  @media (max-width: 600px) {
    .pubnav .nlinks { display: none; }
    .burger { display: inline-flex; }
    .feed-grid { grid-template-columns: 1fr; }
    .disc-head h1 { font-size: 26px; }
  }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <g id="i-heart" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20s-7-4.5-9.3-8.2C1 9 2 5.8 5 5.2c1.9-.4 3.4.6 4.2 1.7.4.6 1.2.6 1.6 0C11.6 5.8 13.1 4.8 15 5.2c3 .6 4 3.8 2.3 6.6C19 15.5 12 20 12 20z"/></g>
  <g id="i-eye" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"/><circle cx="12" cy="12" r="2.5"/></g>
  <g id="i-search" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></g>
  <g id="i-fire" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c1 3-1 4-1 6a3 3 0 006 0c0-1 0-2-1-3 3 2 5 5 5 8a7 7 0 01-14 0c0-4 3-6 5-11z"/></g>
  <g id="i-star" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.6 5.6L21 9.4l-4.6 4.3L17.6 21 12 17.6 6.4 21l1.2-7.3L3 9.4l6.4-.8z"/></g>
  <g id="i-clock" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></g>
  <g id="i-users" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19a5.5 5.5 0 0111 0"/><path d="M16 5.5a3 3 0 010 5.8M16.5 19a5.5 5.5 0 00-3-4.9"/></g>
  <g id="i-tag" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12V4h8l9 9-8 8z"/><circle cx="7.5" cy="7.5" r="1.3" fill="currentColor"/></g>
  <g id="i-arrow" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></g>
  <g id="i-burger" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></g>
</defs></svg>

<nav class="pubnav">
  <div class="pubnav-in">
    <a class="logo" href="D-Swipe Top (Swipe).html">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><defs><linearGradient id="pl" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#0ea5e9"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs><rect x="1" y="1" width="38" height="38" rx="11" fill="#0b1f3a"/><path d="M11 13h6c4 0 7 2.8 7 7s-3 7-7 7h-6z" fill="none" stroke="url(#pl)" stroke-width="2.6" stroke-linejoin="round"/><path d="M25 20l6-5m-6 5l6 5" stroke="url(#pl)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      D<span style="color:var(--brand)">-</span>Swipe
    </a>
    <div class="nlinks">
      <a class="on" href="D-Swipe Discover.html">発見</a>
      <a href="D-Swipe Public LP View.html">マーケット</a>
    </div>
    <div class="right">
      <a class="login" href="D-Swipe Login.html">ログイン</a>
      <a class="btn btn-primary btn-sm" href="D-Swipe Login.html">無料で始める</a>
    </div>
    <button class="burger" aria-label="メニュー"><svg width="24" height="24" viewBox="0 0 24 24"><use href="#i-burger"/></svg></button>
  </div>
</nav>

<header class="disc-head">
  <div class="disc-head-in">
    <h1>発見</h1>
    <p>クリエイターが公開したスワイプLPを探そう。気になる作り手をフォローして、学びを集めよう。</p>
    <div class="searchbar">
      <svg viewBox="0 0 24 24"><use href="#i-search"/></svg>
      <input id="search" placeholder="LP・クリエイター・キーワードで検索" />
    </div>
    <div class="cats" id="cats">
      <button class="cat on" data-cat="all">すべて</button>
      <button class="cat" data-cat="マーケティング">マーケティング</button>
      <button class="cat" data-cat="副業">副業</button>
      <button class="cat" data-cat="SNS">SNS</button>
      <button class="cat" data-cat="ライティング">ライティング</button>
      <button class="cat" data-cat="投資">投資</button>
      <button class="cat" data-cat="マインド">マインド</button>
    </div>
  </div>
</header>

<div class="wrap disc-body">
  <main>
    <div class="sorts" id="sorts">
      <button class="sort on" data-sort="pop"><svg viewBox="0 0 24 24"><use href="#i-star"/></svg>人気</button>
      <button class="sort" data-sort="new"><svg viewBox="0 0 24 24"><use href="#i-clock"/></svg>新着</button>
      <button class="sort" data-sort="trend"><svg viewBox="0 0 24 24"><use href="#i-fire"/></svg>急上昇</button>
    </div>

    <div class="feed-grid" id="grid">
      <!-- cards injected -->
    </div>
  </main>

  <aside class="sidebar">
    <div class="side-card">
      <h3><svg viewBox="0 0 24 24"><use href="#i-users"/></svg>注目のクリエイター</h3>
      <div class="creator"><span class="cav" style="background:linear-gradient(135deg,#22d3ee,#0284c7)">山</span><div class="cinfo"><div class="cn">山田 太郎</div><div class="cf">3,280 フォロワー</div></div><button class="fbtn">フォロー</button></div>
      <div class="creator"><span class="cav" style="background:linear-gradient(135deg,#f59e0b,#ef4444)">A</span><div class="cinfo"><div class="cn">佐藤 あや</div><div class="cf">1,940 フォロワー</div></div><button class="fbtn">フォロー</button></div>
      <div class="creator"><span class="cav" style="background:linear-gradient(135deg,#16a34a,#22d3ee)">け</span><div class="cinfo"><div class="cn">鈴木 けん</div><div class="cf">5,120 フォロワー</div></div><button class="fbtn">フォロー</button></div>
    </div>
    <div class="side-card">
      <h3><svg viewBox="0 0 24 24"><use href="#i-tag"/></svg>人気のタグ</h3>
      <div class="tagcloud">
        <span># 集客</span><span># LP制作</span><span># 副業</span><span># Instagram</span><span># コピーライティング</span><span># 個人事業</span><span># 習慣化</span>
      </div>
    </div>
    <div class="cta-card">
      <b>あなたも作ってみる</b>
      <p>ノーコード×AIで、最初のスワイプLPを3分で公開。</p>
      <a class="btn btn-primary btn-block btn-sm" href="D-Swipe Login.html">無料で始める<svg viewBox="0 0 24 24"><use href="#i-arrow"/></svg></a>
    </div>
  </aside>
</div>

<script>
  const DATA = [
    { t: "7日間スワイプ集客チャレンジ", cat: "マーケティング", au: "山田 太郎", av: "山,#22d3ee,#0284c7", bg: "linear-gradient(150deg,#0b1f3a,#0e7490)", v: 8420, l: 1240, trend: true, new: 3 },
    { t: "副業ロードマップ無料配布", cat: "副業", au: "佐藤 あや", av: "A,#f59e0b,#ef4444", bg: "linear-gradient(150deg,#0284c7,#06b6d4)", v: 5910, l: 860, trend: false, new: 1 },
    { t: "売れる文章の作り方 講座", cat: "ライティング", au: "鈴木 けん", av: "け,#16a34a,#22d3ee", bg: "linear-gradient(150deg,#0e7490,#22d3ee)", v: 12300, l: 2410, trend: true, new: 6 },
    { t: "Instagram集客 30日プログラム", cat: "SNS", au: "田中 みう", av: "み,#7c3aed,#0284c7", bg: "linear-gradient(150deg,#1b3a61,#0284c7)", v: 4180, l: 520, trend: false, new: 2 },
    { t: "ほったらかし投資の始め方", cat: "投資", au: "高橋 じん", av: "じ,#0ea5e9,#22d3ee", bg: "linear-gradient(150deg,#0b1f3a,#1b3a61)", v: 7650, l: 980, trend: true, new: 5 },
    { t: "続ける人の習慣デザイン", cat: "マインド", au: "山田 太郎", av: "山,#22d3ee,#0284c7", bg: "linear-gradient(150deg,#0f2c52,#0e7490)", v: 9640, l: 1780, trend: false, new: 4 },
    { t: "ゼロから学ぶLP制作入門", cat: "マーケティング", au: "鈴木 けん", av: "け,#16a34a,#22d3ee", bg: "linear-gradient(150deg,#0284c7,#0b1f3a)", v: 3120, l: 410, trend: false, new: 0 },
    { t: "X(旧Twitter)運用の教科書", cat: "SNS", au: "佐藤 あや", av: "A,#f59e0b,#ef4444", bg: "linear-gradient(150deg,#0e7490,#0b1f3a)", v: 6280, l: 1120, trend: true, new: 7 },
    { t: "コピーで売上を2倍にする型", cat: "ライティング", au: "田中 みう", av: "み,#7c3aed,#0284c7", bg: "linear-gradient(150deg,#0b1f3a,#0284c7)", v: 2980, l: 350, trend: false, new: 1 },
    { t: "副業で月5万円の作り方", cat: "副業", au: "高橋 じん", av: "じ,#0ea5e9,#22d3ee", bg: "linear-gradient(150deg,#1b3a61,#0e7490)", v: 11200, l: 2050, trend: true, new: 8 },
  ];

  const grid = document.getElementById('grid');
  let activeCat = 'all', activeSort = 'pop', q = '';

  function avatar(spec) { const [ch, c1, c2] = spec.split(','); return { ch, bg: `linear-gradient(135deg,${c1},${c2})` }; }
  function fmt(n) { return n.toLocaleString(); }

  function build() {
    let rows = DATA.map((d, i) => ({ ...d, i }));
    if (activeCat !== 'all') rows = rows.filter((d) => d.cat === activeCat);
    if (q) rows = rows.filter((d) => (d.t + d.au + d.cat).toLowerCase().includes(q.toLowerCase()));
    if (activeSort === 'pop') rows.sort((a, b) => b.l - a.l);
    else if (activeSort === 'new') rows.sort((a, b) => b.new - a.new);
    else rows.sort((a, b) => (b.trend - a.trend) || (b.v - a.v));

    if (!rows.length) { grid.innerHTML = '<div class="empty">該当するLPが見つかりませんでした。</div>'; return; }

    grid.innerHTML = rows.map((d) => {
      const a = avatar(d.av);
      const trend = (activeSort === 'trend' && d.trend) ? `<span class="trend"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><use href="#i-fire"/></svg>急上昇</span>` : '';
      return `<article class="lpcard">
        <div class="lpthumb" style="background:${d.bg}" onclick="location.href='D-Swipe Public LP View.html'">
          <span class="cat-badge">${d.cat}</span>${trend}
          <div class="htitle">${d.t}</div>
        </div>
        <div class="lpbody"><div class="lprow">
          <span class="lpav" style="background:${a.bg};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#042032">${a.ch}</span>
          <a class="lpauthor" href="D-Swipe Creator Profile.html">${d.au}</a>
          <div class="lpmeta">
            <span class="v"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><use href="#i-eye"/></svg>${fmt(d.v)}</span>
            <button class="likebtn" data-l="${d.l}"><svg viewBox="0 0 24 24"><use href="#i-heart"/></svg><span>${fmt(d.l)}</span></button>
          </div>
        </div></div>
      </article>`;
    }).join('');

    grid.querySelectorAll('.likebtn').forEach((b) => {
      b.addEventListener('click', (e) => {
        e.stopPropagation();
        const liked = b.classList.toggle('liked');
        const base = +b.dataset.l;
        b.querySelector('span').textContent = fmt(base + (liked ? 1 : 0));
      });
    });
  }
  build();

  document.getElementById('cats').addEventListener('click', (e) => {
    const b = e.target.closest('.cat'); if (!b) return;
    document.querySelectorAll('.cat').forEach((c) => c.classList.toggle('on', c === b));
    activeCat = b.dataset.cat; build();
  });
  document.getElementById('sorts').addEventListener('click', (e) => {
    const b = e.target.closest('.sort'); if (!b) return;
    document.querySelectorAll('.sort').forEach((c) => c.classList.toggle('on', c === b));
    activeSort = b.dataset.sort; build();
  });
  document.getElementById('search').addEventListener('input', (e) => { q = e.target.value; build(); });

  document.querySelectorAll('.fbtn').forEach((b) => b.addEventListener('click', () => {
    const on = b.classList.toggle('on');
    b.textContent = on ? 'フォロー中' : 'フォロー';
  }));
</script>
</body>
</html>
