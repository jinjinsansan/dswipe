<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D-Swipe — 購入完了</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="c-system/tokens.css" />
<link rel="stylesheet" href="c-system/components.css" />
<style>
  body { margin: 0; font-family: var(--font); background: var(--canvas); color: var(--text); -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { width: 100%; max-width: 440px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-3xl); box-shadow: var(--sh-card); padding: 36px 30px; text-align: center; }
  .ok { width: 72px; height: 72px; border-radius: 50%; background: var(--success-tint); color: var(--success); display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; position: relative; }
  .ok svg { width: 38px; height: 38px; }
  .ok::after { content: ""; position: absolute; inset: -8px; border-radius: 50%; border: 2px solid var(--success); opacity: .25; }
  h1 { font-size: 24px; font-weight: 800; letter-spacing: -.02em; color: var(--ink); margin: 0; }
  .sub { font-size: 14px; color: var(--text-2); margin: 10px 0 24px; line-height: 1.7; }
  .receipt { background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-xl); padding: 16px 18px; text-align: left; margin-bottom: 22px; }
  .receipt .item { display: flex; gap: 12px; align-items: center; padding-bottom: 14px; border-bottom: 1px solid var(--line); margin-bottom: 14px; }
  .receipt .item .th { width: 46px; height: 46px; border-radius: 11px; flex-shrink: 0; }
  .receipt .item .nm { font-size: 13.5px; font-weight: 700; color: var(--ink); line-height: 1.4; }
  .receipt .item .by { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .receipt .ln { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--text-2); margin-bottom: 7px; }
  .receipt .ln .v { color: var(--ink); font-variant-numeric: tabular-nums; }
  .receipt .ln.tot { font-weight: 700; font-size: 13.5px; padding-top: 8px; border-top: 1px solid var(--line); margin-top: 8px; }
  .receipt .ln.tot .v { color: var(--brand); }
  .acts { display: flex; flex-direction: column; gap: 10px; }
  .nextcard { display: flex; align-items: center; gap: 12px; background: var(--surface-tint); border: 1px solid var(--tint-border); border-radius: var(--r-md); padding: 13px 14px; margin-bottom: 16px; text-align: left; }
  .nextcard .ic { width: 36px; height: 36px; border-radius: 10px; background: var(--grad-brand); color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: var(--sh-glow); }
  .nextcard .ic svg { width: 19px; height: 19px; }
  .nextcard b { font-size: 13px; color: var(--ink); }
  .nextcard p { font-size: 11.5px; color: var(--text-2); margin: 2px 0 0; }
  .foot { font-size: 11.5px; color: var(--muted); margin-top: 18px; line-height: 1.6; }
  .foot a { color: var(--brand); font-weight: 600; }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <g id="i-check" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></g>
  <g id="i-play" fill="currentColor"><path d="M7 5l11 7-11 7z"/></g>
  <g id="i-arrow" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></g>
</defs></svg>

<div class="card">
  <div class="ok"><svg viewBox="0 0 24 24"><use href="#i-check"/></svg></div>
  <h1>購入が完了しました</h1>
  <p class="sub">ありがとうございます。コンテンツはすぐにご利用いただけます。<br>領収書を <b>you@d-swipe.com</b> に送信しました。</p>

  <div class="receipt">
    <div class="item"><span class="th" style="background:linear-gradient(150deg,#0b1f3a,#0e7490)"></span><div><div class="nm">スワイプ集客マスター講座</div><div class="by">山田 太郎</div></div></div>
    <div class="ln"><span>注文番号</span><span class="v">#DS-20260610-4821</span></div>
    <div class="ln"><span>お支払い方法</span><span class="v">ポイント</span></div>
    <div class="ln tot"><span>お支払い合計</span><span class="v">9,800 P</span></div>
  </div>

  <a class="nextcard" href="D-Swipe Dashboard.html" style="text-decoration:none">
    <span class="ic"><svg viewBox="0 0 24 24"><use href="#i-play"/></svg></span>
    <div style="flex:1"><b>今すぐ視聴を始める</b><p>マイページのライブラリに追加されました</p></div>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><use href="#i-arrow"/></svg>
  </a>

  <div class="acts">
    <a class="btn btn-primary btn-lg btn-block" href="D-Swipe Dashboard.html">ダッシュボードへ</a>
    <a class="btn btn-secondary btn-block" href="D-Swipe Marketplace.html">マーケットに戻る</a>
  </div>

  <div class="foot">残高：12,500 P → <b>2,700 P</b> ／ ご不明点は <a href="#">サポート</a> へ</div>
</div>
</body>
</html>
